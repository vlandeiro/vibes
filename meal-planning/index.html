<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meal Planner">
<title>Meal Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
/*
  Dark theme is default. Light is opt-in via prefers-color-scheme.
  Do NOT use <meta name="color-scheme"> — causes Safari to override variables.
*/
:root {
  --bg:           #1a1208;
  --surface:      #2a1f10;
  --surface2:     #342710;
  --border:       #4a3820;
  --accent:       #f5a623;
  --accent-dim:   rgba(245,166,35,.12);
  --lunch:        #e8543a;
  --lunch-dim:    rgba(232,84,58,.13);
  --dinner:       #7c4dbb;
  --dinner-dim:   rgba(124,77,187,.13);
  --snacks:       #2ea87e;
  --snacks-dim:   rgba(46,168,126,.13);
  --text:         #f5e8d0;
  --text-muted:   #a08060;
  --text-faint:   #6a5040;
  --today-bg:     rgba(245,166,35,.07);
  --locked-bg:    rgba(245,166,35,.14);
  --out-color:    #e8a020;
  --danger:       #e85050;
  --btn-bg:       #3a2a18;
  --btn-text:     #d4b890;
  --btn-border:   #5a4030;
  --input-bg:     #221808;
  --input-border: #5a4030;
  --badge-synced: #2ea87e;
  --badge-error:  #e85050;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg:           #fdf6ec;
    --surface:      #ffffff;
    --surface2:     #f5ede0;
    --border:       #e0cdb0;
    --accent:       #d4870a;
    --accent-dim:   rgba(212,135,10,.10);
    --lunch:        #c8402a;
    --lunch-dim:    rgba(200,64,42,.10);
    --dinner:       #6030a0;
    --dinner-dim:   rgba(96,48,160,.10);
    --snacks:       #1e8860;
    --snacks-dim:   rgba(30,136,96,.10);
    --text:         #1a1208;
    --text-muted:   #806040;
    --text-faint:   #b09070;
    --today-bg:     rgba(212,135,10,.07);
    --locked-bg:    rgba(212,135,10,.12);
    --out-color:    #b07010;
    --danger:       #c03030;
    --btn-bg:       #f0e4d0;
    --btn-text:     #3a2a18;
    --btn-border:   #d0b890;
    --input-bg:     #fdf6ec;
    --input-border: #d0b890;
    --badge-synced: #1e8860;
    --badge-error:  #c03030;
  }
}

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%; max-width: 100%; overflow-x: hidden;
}

body {
  background-color: #1a1208;
  background-color: var(--bg);
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  color: #f5e8d0;
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-wrap: wrap;
}

.app-title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--accent);
  white-space: nowrap;
}

.app-title span { font-size: 20px; margin-right: 6px; }

.nav-tabs {
  display: flex;
  gap: 4px;
}

.nav-tab {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--btn-border);
  background: transparent;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.nav-tab:hover { color: var(--text); border-color: var(--accent); }
.nav-tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #1a1208;
}

.sync-badge {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 12px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s;
}
.sync-badge.show { opacity: 1; }
.sync-badge.synced { color: var(--badge-synced); background: rgba(46,168,126,.12); }
.sync-badge.syncing { color: var(--accent); background: var(--accent-dim); }
.sync-badge.error { color: var(--badge-error); background: rgba(232,80,80,.12); }

/* ── Main content ── */
.app-main {
  flex: 1;
  padding: 0 16px 40px;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}

/* ── View toggle ── */
.view { display: none; }
.view.active { display: block; }

/* ─────────────────────────────────────────
   PLANNER VIEW
───────────────────────────────────────── */
.week-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 16px 0 12px;
  flex-wrap: wrap;
}

.week-label {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 18px;
  color: var(--accent);
  flex: 1;
  text-align: center;
  min-width: 200px;
}

.btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--btn-border);
  background: var(--btn-bg);
  color: var(--btn-text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #1a1208;
}
.btn-primary:hover { opacity: 0.88; color: #1a1208; border-color: var(--accent); }
.btn-primary:disabled { opacity: 0.4; }

.generate-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.refinement-input {
  flex: 1;
  min-width: 180px;
  padding: 7px 12px;
  border-radius: 8px;
  border: 1px solid var(--input-border);
  background: var(--input-bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color-scheme: dark;
}

.refinement-input::placeholder { color: var(--text-faint); }
.refinement-input:focus { outline: none; border-color: var(--accent); }

/* ── Day rows ── */
.day-row {
  display: flex;
  align-items: stretch;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  margin-bottom: 8px;
  overflow: hidden;
  transition: background 0.15s;
}

.day-row.is-today {
  background: var(--today-bg);
  border-color: var(--accent);
}

.day-label {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 72px;
  min-width: 72px;
  padding: 12px 6px;
  border-right: 1px solid var(--border);
}

.day-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.day-date {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
}

.day-row.is-today .day-name { color: var(--accent); }
.day-row.is-today .day-date { color: var(--accent); }

.meal-slots {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}

.meal-slot {
  padding: 10px 12px;
  border-left: 3px solid transparent;
  position: relative;
  min-height: 72px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.meal-slot:not(:last-child) {
  border-right: 1px solid var(--border);
}

.meal-slot[data-meal="lunch"]  { border-left-color: var(--lunch); background: var(--lunch-dim); }
.meal-slot[data-meal="dinner"] { border-left-color: var(--dinner); background: var(--dinner-dim); }
.meal-slot[data-meal="snacks"] { border-left-color: var(--snacks); background: var(--snacks-dim); }

.meal-slot.is-locked { background: var(--locked-bg) !important; }
.meal-slot.is-locked .meal-slot-label { opacity: 0.7; }

.meal-slot-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
}

.meal-slot-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.meal-slot[data-meal="lunch"]  .meal-slot-label { color: var(--lunch); }
.meal-slot[data-meal="dinner"] .meal-slot-label { color: var(--dinner); }
.meal-slot[data-meal="snacks"] .meal-slot-label { color: var(--snacks); }

.slot-icons {
  display: flex;
  gap: 2px;
  align-items: center;
}

.slot-icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 3px;
  border-radius: 4px;
  font-size: 12px;
  opacity: 0.35;
  transition: opacity 0.15s, background 0.15s;
  line-height: 1;
}

.slot-icon-btn:hover { opacity: 0.8; background: var(--surface2); }
.slot-icon-btn.active { opacity: 1; }
.slot-icon-btn.lock-btn.active { color: var(--accent); }
.slot-icon-btn.out-btn.active  { color: var(--out-color); }

.meal-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  cursor: pointer;
  min-height: 32px;
  padding: 3px 0;
  flex: 1;
  word-break: break-word;
}

.meal-text:empty::before {
  content: attr(data-placeholder);
  color: var(--text-faint);
  font-style: italic;
}

.meal-text.is-out {
  color: var(--out-color);
  font-style: italic;
}

.meal-textarea {
  width: 100%;
  min-height: 48px;
  padding: 4px 6px;
  border-radius: 6px;
  border: 1px solid var(--accent);
  background: var(--input-bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  resize: vertical;
  color-scheme: dark;
  flex: 1;
}

.meal-textarea:focus { outline: none; }

.export-bar {
  display: flex;
  justify-content: flex-end;
  padding-top: 12px;
}

/* Mobile: stack meal slots vertically */
@media (max-width: 560px) {
  .meal-slots { grid-template-columns: 1fr; }
  .meal-slot:not(:last-child) {
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .day-label { width: 56px; min-width: 56px; }
}

/* ─────────────────────────────────────────
   RECIPES VIEW
───────────────────────────────────────── */
.view-header {
  padding: 20px 0 16px;
}

.view-title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 20px;
  color: var(--accent);
  margin-bottom: 4px;
}

.view-subtitle { font-size: 13px; color: var(--text-muted); }

.recipe-import {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}

.recipe-import-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.recipe-paste-area {
  width: 100%;
  min-height: 120px;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--input-border);
  background: var(--input-bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  resize: vertical;
  color-scheme: dark;
  margin-bottom: 10px;
}

.recipe-paste-area::placeholder { color: var(--text-faint); }
.recipe-paste-area:focus { outline: none; border-color: var(--accent); }

.recipe-list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.recipe-count {
  font-size: 13px;
  color: var(--text-muted);
}

.recipe-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 420px;
  overflow-y: auto;
}

.recipe-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 14px;
}

.recipe-item-name { flex: 1; }

.recipe-delete-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-faint);
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
  transition: color 0.15s;
}
.recipe-delete-btn:hover { color: var(--danger); }

/* ─────────────────────────────────────────
   SETTINGS VIEW
───────────────────────────────────────── */
.settings-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 14px;
}

.settings-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--accent);
  margin-bottom: 14px;
}

.field-row {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 12px;
}

.field-row:last-child { margin-bottom: 0; }

.field-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
}

.field-input {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--input-border);
  background: var(--input-bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color-scheme: dark;
}

.field-input:focus { outline: none; border-color: var(--accent); }

.field-select {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--input-border);
  background: var(--input-bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color-scheme: dark;
  cursor: pointer;
}

.field-select:focus { outline: none; border-color: var(--accent); }

.field-textarea {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--input-border);
  background: var(--input-bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  resize: vertical;
  min-height: 100px;
  color-scheme: dark;
}

.field-textarea:focus { outline: none; border-color: var(--accent); }

.meal-times-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

@media (max-width: 500px) {
  .meal-times-grid { grid-template-columns: 1fr; }
}

.meal-time-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
}

.meal-time-card-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.meal-time-card[data-meal="lunch"]  .meal-time-card-label { color: var(--lunch); }
.meal-time-card[data-meal="dinner"] .meal-time-card-label { color: var(--dinner); }
.meal-time-card[data-meal="snacks"] .meal-time-card-label { color: var(--snacks); }

.time-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 6px;
}
.time-row:last-child { margin-bottom: 0; }

.time-row-label {
  font-size: 11px;
  color: var(--text-muted);
}

.time-input {
  padding: 5px 8px;
  border-radius: 6px;
  border: 1px solid var(--input-border);
  background: var(--input-bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color-scheme: dark;
}
.time-input:focus { outline: none; border-color: var(--accent); }

/* ── Loading overlay ── */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,18,8,.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
}

.loading-overlay.show { display: flex; }

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

.loading-text {
  color: var(--text-muted);
  font-size: 14px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title"><span>🍽</span>Meal Planner</div>
  <nav class="nav-tabs">
    <button class="nav-tab active" data-view="planner">Planner</button>
    <button class="nav-tab" data-view="recipes">Recipes</button>
    <button class="nav-tab" data-view="settings">Settings</button>
  </nav>
  <span id="syncBadge" class="sync-badge"></span>
</header>

<main class="app-main">

  <!-- PLANNER VIEW -->
  <div id="view-planner" class="view active">
    <div class="week-nav">
      <button class="btn" id="btnPrevWeek">← Prev</button>
      <div class="week-label" id="weekLabel">Loading…</div>
      <button class="btn" id="btnNextWeek">Next →</button>
      <button class="btn" id="btnToday">Today</button>
    </div>
    <div class="generate-bar">
      <button class="btn btn-primary" id="btnGenerate">✨ Generate Week</button>
      <input class="refinement-input" id="refinementInput"
             type="text" placeholder="Refinement note (e.g. lighter lunches this week)…">
    </div>
    <div id="weekGrid"></div>
    <div class="export-bar">
      <button class="btn" id="btnExport">📅 Export to Calendar</button>
    </div>
  </div>

  <!-- RECIPES VIEW -->
  <div id="view-recipes" class="view">
    <div class="view-header">
      <div class="view-title">Recipe Book</div>
      <div class="view-subtitle">Paste your recipe list below — one recipe per line.</div>
    </div>
    <div class="recipe-import">
      <div class="recipe-import-label">Import / bulk edit</div>
      <textarea class="recipe-paste-area" id="recipePasteArea"
                placeholder="Pasta Bolognese&#10;Chicken Stir-fry&#10;Tacos&#10;…"></textarea>
      <button class="btn btn-primary" id="btnParseRecipes">Parse &amp; Save</button>
    </div>
    <div class="recipe-list-header">
      <span class="recipe-count" id="recipeCount">0 recipes</span>
      <button class="btn" id="btnClearRecipes">Clear all</button>
    </div>
    <div class="recipe-list" id="recipeList"></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div id="view-settings" class="view">
    <div class="view-header">
      <div class="view-title">Settings</div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">LLM Provider</div>
      <div class="field-row">
        <label class="field-label" for="settingsProvider">Provider</label>
        <select class="field-select" id="settingsProvider">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI (ChatGPT)</option>
        </select>
      </div>
      <div class="field-row">
        <label class="field-label" for="settingsModel">Model</label>
        <input class="field-input" id="settingsModel" type="text" placeholder="claude-opus-4-6">
      </div>
      <div class="field-row">
        <label class="field-label" for="settingsLlmKey">API Key</label>
        <input class="field-input" id="settingsLlmKey" type="password" placeholder="sk-…">
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">GitHub Sync</div>
      <div class="field-row">
        <label class="field-label" for="settingsGithubPat">Personal Access Token</label>
        <input class="field-input" id="settingsGithubPat" type="password" placeholder="ghp_…">
      </div>
      <div class="field-row">
        <label class="field-label" for="settingsGithubRepo">Repository (owner/repo)</label>
        <input class="field-input" id="settingsGithubRepo" type="text" placeholder="vlandeiro/vibes">
      </div>
      <div class="field-row">
        <label class="field-label" for="settingsGithubPath">Data file path</label>
        <input class="field-input" id="settingsGithubPath" type="text" placeholder="meal-planning/data.json">
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Dietary Preferences</div>
      <div class="field-row">
        <label class="field-label" for="settingsPreferences">Sent to LLM when generating meal plans</label>
        <textarea class="field-textarea" id="settingsPreferences"
                  placeholder="- 5 servings of fruits and vegetables per day&#10;- Baby-friendly (1 year old)&#10;- Account for leftovers on some days&#10;- Avoid repeating meals across weeks&#10;- Balanced nutrition"></textarea>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Meal Times (for calendar export)</div>
      <div class="meal-times-grid">
        <div class="meal-time-card" data-meal="lunch">
          <div class="meal-time-card-label">Lunch</div>
          <div class="time-row">
            <div class="time-row-label">Start</div>
            <input class="time-input" type="time" id="lunchStart" value="12:00">
          </div>
          <div class="time-row">
            <div class="time-row-label">End</div>
            <input class="time-input" type="time" id="lunchEnd" value="13:00">
          </div>
        </div>
        <div class="meal-time-card" data-meal="dinner">
          <div class="meal-time-card-label">Dinner</div>
          <div class="time-row">
            <div class="time-row-label">Start</div>
            <input class="time-input" type="time" id="dinnerStart" value="18:00">
          </div>
          <div class="time-row">
            <div class="time-row-label">End</div>
            <input class="time-input" type="time" id="dinnerEnd" value="19:00">
          </div>
        </div>
        <div class="meal-time-card" data-meal="snacks">
          <div class="meal-time-card-label">Snacks</div>
          <div class="time-row">
            <div class="time-row-label">Start</div>
            <input class="time-input" type="time" id="snacksStart" value="15:00">
          </div>
          <div class="time-row">
            <div class="time-row-label">End</div>
            <input class="time-input" type="time" id="snacksEnd" value="15:30">
          </div>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" id="btnSaveSettings">Save Settings</button>
  </div>
