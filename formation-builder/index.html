<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Formation">
<meta name="color-scheme" content="light dark">
<title>Formation Builder — 8v8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #f0c040;
    --bg: #111a0e;
    --panel: #1a2216;
    --panel-border: #3a4a34;
    --field-border: #3a4a34;
    --text: #e0d8c8;
    --text-muted: #a09880;
    --btn-bg: #2a3a24;
    --btn-text: #d0c8b0;
    --btn-active: #f0c040;
    --btn-active-text: #1a2216;
    --input-placeholder: #807860;
    --field-wrap-bg: #0d1a08;
    --shadow-strong: rgba(0,0,0,0.5);
    --shadow-med: rgba(0,0,0,0.3);
    --bench-bg: #14200f;
    --bench-slot: #1e2e18;
    --bench-slot-border: #3a4a34;
    --swap-highlight: rgba(240,192,64,0.3);
    --export-bg: #2a3a24;
    --export-text: #e0d8c8;
    --export-hover: #3a5030;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --accent: #2e7d32;
      --bg: #f0ede6;
      --panel: #ffffff;
      --panel-border: #d0ccc0;
      --field-border: #c0bca8;
      --text: #2a2a20;
      --text-muted: #706850;
      --btn-bg: #e8e4d8;
      --btn-text: #3a3828;
      --btn-active: #2e7d32;
      --btn-active-text: #ffffff;
      --input-placeholder: #a09880;
      --field-wrap-bg: #d8e8d0;
      --shadow-strong: rgba(0,0,0,0.12);
      --shadow-med: rgba(0,0,0,0.08);
      --bench-bg: #e8e4d8;
      --bench-slot: #f5f2ea;
      --bench-slot-border: #d0ccc0;
      --swap-highlight: rgba(46,125,50,0.2);
      --export-bg: #2e7d32;
      --export-text: #ffffff;
      --export-hover: #388e3c;
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: var(--bg); font-family:'DM Sans',sans-serif; color:var(--text);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:24px 12px 40px; overflow-x:hidden; transition:background .3s,color .3s;
  }
  h1 { font-family:'Instrument Serif',serif; font-size:28px; font-weight:400; color:var(--accent); letter-spacing:.5px; margin-bottom:2px; }
  .subtitle { font-size:13px; color:var(--text-muted); margin-bottom:18px; }
  .formations { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:18px; max-width:460px; }
  .formations button {
    padding:6px 14px; border-radius:6px; border:1px solid var(--panel-border);
    background:var(--btn-bg); color:var(--btn-text); font-family:'DM Sans',sans-serif;
    font-size:13px; font-weight:600; cursor:pointer; transition:all .15s;
  }
  .formations button.active { border-color:var(--accent); background:var(--btn-active); color:var(--btn-active-text); }

.main { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; align-items:flex-start; width:100%; max-width:720px; }

/* Pitch + bench column */
.pitch-col { display:flex; flex-direction:column; gap:10px; flex:1 1 420px; max-width:440px; }
.field-wrap {
background:var(–field-wrap-bg); border-radius:12px; padding:10px;
box-shadow:0 8px 32px var(–shadow-strong); border:1px solid var(–field-border);
touch-action:none; position:relative;
}
.field-wrap svg { width:100%; display:block; border-radius:8px; }

/* Bench */
.bench {
background:var(–bench-bg); border:1px solid var(–panel-border); border-radius:10px;
padding:10px 12px;
}
.bench-title {
font-family:‘Instrument Serif’,serif; font-size:14px; font-weight:400;
color:var(–accent); margin-bottom:8px;
}
.bench-row { display:flex; gap:8px; flex-wrap:wrap; }
.bench-slot {
width:60px; height:68px; border-radius:8px; background:var(–bench-slot);
border:2px dashed var(–bench-slot-border); display:flex; flex-direction:column;
align-items:center; justify-content:center; cursor:grab; transition:all .15s;
position:relative;
}
.bench-slot.highlight { border-color:var(–accent); background:var(–swap-highlight); }
.bench-slot .bench-name {
font-size:8px; font-weight:600; color:var(–text); margin-top:2px;
max-width:56px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center;
}
.bench-slot .bench-name.empty { color:var(–text-muted); font-style:italic; }

/* Export button */
.export-btn {
padding:8px 18px; border-radius:8px; border:none; background:var(–export-bg);
color:var(–export-text); font-family:‘DM Sans’,sans-serif; font-size:13px;
font-weight:600; cursor:pointer; transition:all .15s; align-self:center;
}
.export-btn:hover { background:var(–export-hover); }
.export-btn:active { transform:scale(0.97); }

/* Roster panel */
.roster {
background:var(–panel); border:1px solid var(–panel-border); border-radius:12px;
padding:16px 18px; min-width:200px; box-shadow:0 4px 20px var(–shadow-med);
flex:1 1 200px; max-width:260px;
}
.roster-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.roster-header h2 { font-family:‘Instrument Serif’,serif; font-size:18px; font-weight:400; color:var(–accent); }
.roster-header button {
font-size:11px; color:var(–text-muted); background:none; border:none;
cursor:pointer; font-family:‘DM Sans’,sans-serif; text-decoration:underline; text-underline-offset:2px;
}
.roster-section-label { font-size:10px; font-weight:600; color:var(–text-muted); text-transform:uppercase; letter-spacing:1px; margin:10px 0 4px; }
.roster-list { display:flex; flex-direction:column; gap:3px; }
.roster-row {
display:flex; align-items:center; gap:10px; padding:6px 10px; border-radius:6px;
cursor:pointer; border:1px solid transparent; transition:all .15s;
}
.roster-row.editing { background:var(–swap-highlight); border-color:rgba(240,192,64,0.27); }
@media (prefers-color-scheme:light) { .roster-row.editing { background:rgba(46,125,50,0.08); border-color:rgba(46,125,50,0.25); } }
.roster-row svg { flex-shrink:0; }
.roster-row input {
flex:1; background:transparent; border:none; outline:none; color:var(–text);
font-family:‘DM Sans’,sans-serif; font-size:13px; font-weight:500; padding:0;
}
.roster-row input::placeholder { color:var(–input-placeholder); }
.roster-name { font-size:13px; font-weight:500; }
.roster-name.empty { color:var(–text-muted); font-style:italic; }
.roster-name.filled { color:var(–text); }
.roster-name.bench-tag { font-size:10px; color:var(–text-muted); margin-left:auto; }
.roster-footer {
margin-top:14px; padding-top:10px; border-top:1px solid var(–panel-border);
font-size:11px; color:var(–text-muted); line-height:1.5;
}
.save-badge { display:inline-block; font-size:10px; color:var(–accent); opacity:0; transition:opacity .3s; margin-left:8px; }
.save-badge.show { opacity:1; }

@media (max-width:600px) {
body { padding:16px 8px 32px; }
.main { flex-direction:column; align-items:center; }
.pitch-col { max-width:100%; }
.roster { max-width:100%; min-width:0; width:100%; }
}
</style>

</head>
<body>

<h1>Formation Builder</h1>
<p class="subtitle">8v8 · Drag to reposition · Tap roster to rename · Drag bench onto field to swap <span id="saveBadge" class="save-badge">✓ Saved</span></p>

<div class="formations" id="formationBtns"></div>

<div class="main">
  <div class="pitch-col">
    <div class="field-wrap" id="fieldWrap">
      <svg id="field" viewBox="0 0 380 560" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="bench" id="benchArea">
      <div class="bench-title">Bench</div>
      <div class="bench-row" id="benchRow"></div>
    </div>
    <button class="export-btn" id="exportBtn">📸 Export as Image</button>
  </div>
  <div class="roster">
    <div class="roster-header">
      <h2>Roster</h2>
      <button id="clearBtn">Clear all</button>
    </div>
    <div id="rosterContent"></div>
    <div class="roster-footer">Drag bench players onto field players to swap. Names persist across formation switches.</div>
  </div>
</div>

<script>
const FW = 380, FH = 560, PR = 22;
const JERSEY = "M -6 -18 L -14 -14 L -22 -8 L -18 0 L -12 -4 L -12 18 Q -12 22 -8 22 L 8 22 Q 12 22 12 18 L 12 -4 L 18 0 L 22 -8 L 14 -14 L 6 -18 Q 3 -14 0 -14 Q -3 -14 -6 -18 Z";
const COLLAR = "M -6 -18 Q -3 -12 0 -12 Q 3 -12 6 -18";
const NS = "http://www.w3.org/2000/svg";
const STORAGE_KEY = "formation_builder_v2";

const FORMATIONS = {
  "3-3-1": [
    {x:.5,y:.92,role:"GK"},{x:.2,y:.75,role:"CB"},{x:.5,y:.72,role:"CB"},{x:.8,y:.75,role:"CB"},
    {x:.2,y:.48,role:"CM"},{x:.5,y:.45,role:"CM"},{x:.8,y:.48,role:"CM"},{x:.5,y:.22,role:"ST"}
  ],
  "2-3-2": [
    {x:.5,y:.92,role:"GK"},{x:.3,y:.75,role:"CB"},{x:.7,y:.75,role:"CB"},
    {x:.2,y:.5,role:"LM"},{x:.5,y:.47,role:"CM"},{x:.8,y:.5,role:"RM"},
    {x:.35,y:.24,role:"ST"},{x:.65,y:.24,role:"ST"}
  ],
  "3-2-2": [
    {x:.5,y:.92,role:"GK"},{x:.2,y:.75,role:"CB"},{x:.5,y:.72,role:"CB"},{x:.8,y:.75,role:"CB"},
    {x:.33,y:.48,role:"CM"},{x:.67,y:.48,role:"CM"},{x:.35,y:.24,role:"ST"},{x:.65,y:.24,role:"ST"}
  ],
  "3-1-2-1": [
    {x:.5,y:.92,role:"GK"},{x:.2,y:.75,role:"CB"},{x:.5,y:.72,role:"CB"},{x:.8,y:.75,role:"CB"},
    {x:.5,y:.55,role:"CDM"},{x:.3,y:.38,role:"AM"},{x:.7,y:.38,role:"AM"},{x:.5,y:.2,role:"ST"}
  ],
  "2-4-1": [
    {x:.5,y:.92,role:"GK"},{x:.3,y:.75,role:"CB"},{x:.7,y:.75,role:"CB"},
    {x:.15,y:.48,role:"LM"},{x:.4,y:.45,role:"CM"},{x:.6,y:.45,role:"CM"},{x:.85,y:.48,role:"RM"},
    {x:.5,y:.22,role:"ST"}
  ],
  "2-1-2-1-1": [
    {x:.5,y:.92,role:"GK"},{x:.3,y:.78,role:"CB"},{x:.7,y:.78,role:"CB"},
    {x:.5,y:.6,role:"CDM"},{x:.25,y:.44,role:"LM"},{x:.75,y:.44,role:"RM"},
    {x:.5,y:.3,role:"AM"},{x:.5,y:.16,role:"ST"}
  ]
};

const DEFAULT_BENCH_COUNT = 4;

// ── State ──
let currentFormation = "3-3-1";
let players = FORMATIONS["3-3-1"].map(p => ({...p, name:""}));
let bench = Array.from({length:DEFAULT_BENCH_COUNT}, () => ({name:"", role:"SUB"}));
let editingIdx = null; // "f0"-"f7" for field, "b0"-"b3" for bench
let draggingIdx = -1;
let benchDragIdx = -1;
let swapTargetIdx = -1;

// ── Theme ──
function isDark() { return window.matchMedia("(prefers-color-scheme:dark)").matches; }
function tc() {
  const d = isDark();
  return {
    fieldBase: d ? "#1a6b37" : "#1e8040",
    fieldStripe: d ? "#227a42" : "#28944c",
    playerFill: d ? "#e8dcc8" : "#ffffff",
    playerStroke: d ? "#5a4a30" : "#4a6a40",
    playerText: d ? "#2d2418" : "#1a3010",
    gkFill: d ? "#f0c040" : "#ffd54f",
    gkStroke: d ? "#a07810" : "#b08a10",
    benchFill: d ? "#8aae7a" : "#b8d8b0",
    benchStroke: d ? "#4a6040" : "#5a8050",
    benchText: d ? "#1a2a10" : "#1a3010",
  };
}

// ── Persistence ──
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!s) return;
    if (s.formation && FORMATIONS[s.formation]) currentFormation = s.formation;
    if (Array.isArray(s.players) && s.players.length === 8)
      players = s.players.map((p,i) => ({
        x: typeof p.x==="number" ? p.x : FORMATIONS[currentFormation][i].x,
        y: typeof p.y==="number" ? p.y : FORMATIONS[currentFormation][i].y,
        role: p.role || FORMATIONS[currentFormation][i].role, name: p.name||""
      }));
    if (Array.isArray(s.bench)) bench = s.bench.map(b => ({name:b.name||"", role:b.role||"SUB"}));
  } catch(e){}
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({formation:currentFormation, players, bench}));
    const b = document.getElementById("saveBadge"); b.classList.add("show");
    setTimeout(()=>b.classList.remove("show"),1200);
  } catch(e){}
}
let saveTimer=null;
function debouncedSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveState,300); }

// ── SVG helpers ──
function el(tag,attrs){ const e=document.createElementNS(NS,tag); if(attrs) Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v)); return e; }

// ── Draw field ──
function drawField(){
  const svg=document.getElementById("field"); svg.innerHTML="";
  const c=tc();
  const defs=el("defs");
  // wide grass stripes
  const pat=el("pattern",{id:"grass",patternUnits:"userSpaceOnUse",width:380,height:80});
  pat.appendChild(el("rect",{width:380,height:80,fill:c.fieldBase}));
  pat.appendChild(el("rect",{x:0,y:0,width:380,height:40,fill:c.fieldStripe,opacity:.35}));
  defs.appendChild(pat);
  // name shadow filter
  const f=el("filter",{id:"ns",x:"-50%",y:"-50%",width:"200%",height:"200%"});
  f.appendChild(el("feDropShadow",{dx:0,dy:1,stdDeviation:1.5,"flood-color":"rgba(0,0,0,0.7)","flood-opacity":1}));
  defs.appendChild(f);
  svg.appendChild(defs);
  svg.appendChild(el("rect",{width:FW,height:FH,fill:"url(#grass)"}));

  const L="rgba(255,255,255,0.5)";
  svg.appendChild(el("rect",{x:20,y:20,width:FW-40,height:FH-40,fill:"none",stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("line",{x1:20,y1:FH/2,x2:FW-20,y2:FH/2,stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("circle",{cx:FW/2,cy:FH/2,r:45,fill:"none",stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("circle",{cx:FW/2,cy:FH/2,r:3,fill:L}));
  svg.appendChild(el("rect",{x:(FW-180)/2,y:FH-110,width:180,height:90,fill:"none",stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("rect",{x:(FW-90)/2,y:FH-56,width:90,height:36,fill:"none",stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("circle",{cx:FW/2,cy:FH-80,r:2.5,fill:L}));
  svg.appendChild(el("path",{d:`M ${FW/2-38} ${FH-110} A 45 45 0 0 1 ${FW/2+38} ${FH-110}`,fill:"none",stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("rect",{x:(FW-180)/2,y:20,width:180,height:90,fill:"none",stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("rect",{x:(FW-90)/2,y:20,width:90,height:36,fill:"none",stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("circle",{cx:FW/2,cy:80,r:2.5,fill:L}));
  svg.appendChild(el("path",{d:`M ${FW/2-38} 110 A 45 45 0 0 0 ${FW/2+38} 110`,fill:"none",stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("path",{d:"M 20 28 A 8 8 0 0 0 28 20",fill:"none",stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("path",{d:`M ${FW-20} 28 A 8 8 0 0 1 ${FW-28} 20`,fill:"none",stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("path",{d:`M 20 ${FH-28} A 8 8 0 0 1 28 ${FH-20}`,fill:"none",stroke:L,"stroke-width":1.5}));
  svg.appendChild(el("path",{d:`M ${FW-20} ${FH-28} A 8 8 0 0 0 ${FW-28} ${FH-20}`,fill:"none",stroke:L,"stroke-width":1.5}));
}

// ── Draw players ──
function drawPlayers(){
  document.querySelectorAll(".player-g").forEach(e=>e.remove());
  const svg=document.getElementById("field"), c=tc();
  players.forEach((p,i)=>{
    const px=p.x*FW, py=p.y*FH, isGK=p.role==="GK";
    const fill=isGK?c.gkFill:c.playerFill, stroke=isGK?c.gkStroke:c.playerStroke;
    const g=el("g",{transform:`translate(${px},${py})`,"data-idx":i,class:"player-g"});
    g.style.cursor="grab";
    g.appendChild(el("path",{d:JERSEY,fill,stroke,"stroke-width":1.8,"stroke-linejoin":"round"}));
    g.appendChild(el("path",{d:COLLAR,fill:"none",stroke,"stroke-width":1,opacity:.4}));
    // role on jersey
    const rt=el("text",{y:6,"text-anchor":"middle","dominant-baseline":"central",fill:c.playerText});
    rt.style.cssText="font-size:11px;font-family:'DM Sans',sans-serif;font-weight:700;pointer-events:none;user-select:none;";
    rt.textContent=p.role; g.appendChild(rt);
    // name below
    if(p.name){
      const nt=el("text",{y:34,"text-anchor":"middle","dominant-baseline":"central",fill:"#ffffff",filter:"url(#ns)"});
      nt.style.cssText="font-size:10px;font-family:'DM Sans',sans-serif;font-weight:600;pointer-events:none;user-select:none;";
      nt.textContent=p.name.length>8?p.name.slice(0,7)+"…":p.name; g.appendChild(nt);
    }
    // highlight circle when swap target
    if(swapTargetIdx===i){
      g.insertBefore(el("circle",{r:30,fill:"none",stroke:"#f0c040","stroke-width":3,opacity:.7}), g.firstChild);
    }
    g.appendChild(el("circle",{r:28,fill:"transparent"}));
    svg.appendChild(g);
  });
}

// ── Bench ──
function drawBench(){
  const row=document.getElementById("benchRow"); row.innerHTML="";
  const c=tc();
  bench.forEach((b,i)=>{
    const slot=document.createElement("div");
    slot.className="bench-slot"+(swapTargetIdx===100+i?" highlight":"");
    slot.dataset.benchIdx=i;
    slot.draggable=false; // we use pointer events
    const svgStr=`<svg width="32" height="32" viewBox="-24 -20 48 44" xmlns="${NS}">
      <path d="${JERSEY}" fill="${c.benchFill}" stroke="${c.benchStroke}" stroke-width="1.5" stroke-linejoin="round"/>
      <text y="8" text-anchor="middle" dominant-baseline="central" fill="${c.benchText}" style="font-size:10px;font-family:'DM Sans',sans-serif;font-weight:700">${b.role}</text>
    </svg>`;
    slot.innerHTML=svgStr;
    const nameEl=document.createElement("div");
    nameEl.className="bench-name"+(b.name?"":" empty");
    nameEl.textContent=b.name||(i+1+"");
    slot.appendChild(nameEl);
    // pointer events for drag from bench
    slot.addEventListener("pointerdown",(e)=>{ e.preventDefault(); benchDragIdx=i; slot.setPointerCapture(e.pointerId); });
    slot.addEventListener("click",()=>{ if(benchDragIdx<0){ editingIdx="b"+i; drawAll(); }});
    row.appendChild(slot);
  });
  // global move/up for bench drag
}

// ── Roster ──
function drawRoster(){
  const cont=document.getElementById("rosterContent"); cont.innerHTML="";
  const c=tc();
  // Field players
  const flabel=document.createElement("div"); flabel.className="roster-section-label"; flabel.textContent="On Field"; cont.appendChild(flabel);
  const flist=document.createElement("div"); flist.className="roster-list"; cont.appendChild(flist);
  players.forEach((p,i)=>{
    const isGK=p.role==="GK";
    const fill=isGK?c.gkFill:c.playerFill, stroke=isGK?c.gkStroke:c.playerStroke;
    const row=document.createElement("div");
    const eid="f"+i;
    row.className="roster-row"+(editingIdx===eid?" editing":"");
    row.innerHTML=`<svg width="24" height="24" viewBox="-24 -20 48 44" xmlns="${NS}"><path d="${JERSEY}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"/><text y="8" text-anchor="middle" dominant-baseline="central" fill="${c.playerText}" style="font-size:10px;font-family:'DM Sans',sans-serif;font-weight:700">${p.role}</text></svg>`;
    if(editingIdx===eid){
      const inp=document.createElement("input"); inp.value=p.name; inp.placeholder="Player name"; inp.maxLength=14;
      inp.addEventListener("blur",()=>{players[i].name=inp.value.trim();editingIdx=null;drawAll();saveState();});
      inp.addEventListener("keydown",(e)=>{if(e.key==="Enter"){players[i].name=inp.value.trim();editingIdx=null;drawAll();saveState();}if(e.key==="Escape"){editingIdx=null;drawAll();}});
      row.appendChild(inp); requestAnimationFrame(()=>{inp.focus();inp.select();});
    } else {
      const span=document.createElement("span"); span.className="roster-name "+(p.name?"filled":"empty");
      span.textContent=p.name||"Tap to name…"; row.appendChild(span);
      row.addEventListener("click",()=>{editingIdx=eid;drawAll();});
    }
    flist.appendChild(row);
  });
  // Bench
  const blabel=document.createElement("div"); blabel.className="roster-section-label"; blabel.textContent="Bench"; cont.appendChild(blabel);
  const blist=document.createElement("div"); blist.className="roster-list"; cont.appendChild(blist);
  bench.forEach((b,i)=>{
    const c2=tc();
    const row=document.createElement("div");
    const eid="b"+i;
    row.className="roster-row"+(editingIdx===eid?" editing":"");
    row.innerHTML=`<svg width="24" height="24" viewBox="-24 -20 48 44" xmlns="${NS}"><path d="${JERSEY}" fill="${c2.benchFill}" stroke="${c2.benchStroke}" stroke-width="1.5" stroke-linejoin="round"/><text y="8" text-anchor="middle" dominant-baseline="central" fill="${c2.benchText}" style="font-size:10px;font-family:'DM Sans',sans-serif;font-weight:700">SUB</text></svg>`;
    if(editingIdx===eid){
      const inp=document.createElement("input"); inp.value=b.name; inp.placeholder="Sub name"; inp.maxLength=14;
      inp.addEventListener("blur",()=>{bench[i].name=inp.value.trim();editingIdx=null;drawAll();saveState();});
      inp.addEventListener("keydown",(e)=>{if(e.key==="Enter"){bench[i].name=inp.value.trim();editingIdx=null;drawAll();saveState();}if(e.key==="Escape"){editingIdx=null;drawAll();}});
      row.appendChild(inp); requestAnimationFrame(()=>{inp.focus();inp.select();});
    } else {
      const span=document.createElement("span"); span.className="roster-name "+(b.name?"filled":"empty");
      span.textContent=b.name||"Tap to name…"; row.appendChild(span);
      row.addEventListener("click",()=>{editingIdx=eid;drawAll();});
    }
    blist.appendChild(row);
  });
}

function drawAll(){ drawPlayers(); drawBench(); drawRoster(); }

// ── Formation buttons ──
function drawFormationBtns(){
  const wrap=document.getElementById("formationBtns"); wrap.innerHTML="";
  Object.keys(FORMATIONS).forEach(key=>{
    const btn=document.createElement("button"); btn.textContent=key;
    btn.className=key===currentFormation?"active":"";
    btn.addEventListener("click",()=>loadFormation(key)); wrap.appendChild(btn);
  });
}
function loadFormation(key){
  currentFormation=key;
  const names=players.map(p=>p.name);
  players=FORMATIONS[key].map((p,i)=>({...p,name:names[i]||""}));
  editingIdx=null; drawFormationBtns(); drawAll(); saveState();
}

// ── Field drag ──
function getSVGPoint(cx,cy){ const svg=document.getElementById("field"),pt=svg.createSVGPoint();pt.x=cx;pt.y=cy;return pt.matrixTransform(svg.getScreenCTM().inverse()); }
function onPointerDown(e){
  const g=e.target.closest(".player-g"); if(!g)return;
  e.preventDefault(); draggingIdx=parseInt(g.dataset.idx); g.style.cursor="grabbing"; g.setPointerCapture(e.pointerId);
}
function onPointerMove(e){
  if(draggingIdx<0)return; e.preventDefault();
  const pt=getSVGPoint(e.clientX,e.clientY);
  const nx=Math.max(PR,Math.min(FW-PR,pt.x))/FW, ny=Math.max(PR,Math.min(FH-PR,pt.y))/FH;
  players[draggingIdx].x=nx; players[draggingIdx].y=ny;
  const g=document.querySelector(`.player-g[data-idx="${draggingIdx}"]`);
  if(g) g.setAttribute("transform",`translate(${nx*FW},${ny*FH})`);
  debouncedSave();
}
function onPointerUp(){ if(draggingIdx<0)return; const g=document.querySelector(`.player-g[data-idx="${draggingIdx}"]`); if(g)g.style.cursor="grab"; draggingIdx=-1; }

// ── Bench drag → field swap ──
function findFieldPlayerAt(cx,cy){
  const svg=document.getElementById("field");
  const rect=svg.getBoundingClientRect();
  // check each player
  for(let i=0;i<players.length;i++){
    const px=players[i].x*rect.width+rect.left, py=players[i].y*rect.height+rect.top;
    const dist=Math.sqrt((cx-px)**2+(cy-py)**2);
    if(dist<35) return i;
  }
  return -1;
}
document.addEventListener("pointermove",(e)=>{
  if(benchDragIdx<0)return;
  const target=findFieldPlayerAt(e.clientX,e.clientY);
  if(target!==swapTargetIdx){ swapTargetIdx=target; drawPlayers(); drawBench(); }
});
document.addEventListener("pointerup",(e)=>{
  if(benchDragIdx<0)return;
  const target=findFieldPlayerAt(e.clientX,e.clientY);
  if(target>=0){
    // swap names
    const tmp=players[target].name;
    players[target].name=bench[benchDragIdx].name;
    bench[benchDragIdx].name=tmp;
    saveState();
  }
  benchDragIdx=-1; swapTargetIdx=-1; drawAll();
});

// ── Export as image ──
document.getElementById("exportBtn").addEventListener("click", async ()=>{
  const btn=document.getElementById("exportBtn");
  btn.textContent="Generating…"; btn.disabled=true;
  try {
    // Build an export SVG that includes pitch + bench
    const svgEl=document.getElementById("field");
    const benchH=80, gap=10, totalH=FH+gap+benchH+10;
    const exportSvg=el("svg",{xmlns:NS,width:FW,height:totalH,viewBox:`0 0 ${FW} ${totalH}`});

    // Clone pitch
    const pitchClone=svgEl.cloneNode(true);
    pitchClone.removeAttribute("id");
    const pitchG=el("g"); pitchG.appendChild(pitchClone); exportSvg.appendChild(pitchG);

    // Bench area
    const benchY=FH+gap;
    const c=tc();
    // bench bg
    exportSvg.appendChild(el("rect",{x:0,y:benchY,width:FW,height:benchH+10,rx:8,fill:isDark()?"#14200f":"#e8e4d8"}));
    // bench label
    const bLabel=el("text",{x:12,y:benchY+16,fill:isDark()?"#f0c040":"#2e7d32"});
    bLabel.style.cssText="font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;";
    bLabel.textContent="Bench"; exportSvg.appendChild(bLabel);
    // bench players
    bench.forEach((b,i)=>{
      const bx=20+i*75, by=benchY+50;
      const bg=el("g",{transform:`translate(${bx},${by}) scale(0.7)`});
      bg.appendChild(el("path",{d:JERSEY,fill:c.benchFill,stroke:c.benchStroke,"stroke-width":1.8,"stroke-linejoin":"round"}));
      const rt=el("text",{y:6,"text-anchor":"middle","dominant-baseline":"central",fill:c.benchText});
      rt.style.cssText="font-size:11px;font-family:'DM Sans',sans-serif;font-weight:700;";
      rt.textContent="SUB"; bg.appendChild(rt);
      exportSvg.appendChild(bg);
      if(b.name){
        const nt=el("text",{x:bx,y:by+24,"text-anchor":"middle","dominant-baseline":"central",fill:isDark()?"#e0d8c8":"#2a2a20"});
        nt.style.cssText="font-size:9px;font-family:'DM Sans',sans-serif;font-weight:600;";
        nt.textContent=b.name.length>8?b.name.slice(0,7)+"…":b.name; exportSvg.appendChild(nt);
      }
    });

    // Serialize + render to canvas
    const serializer=new XMLSerializer();
    const svgStr=serializer.serializeToString(exportSvg);
    const svgBlob=new Blob([svgStr],{type:"image/svg+xml;charset=utf-8"});
    const url=URL.createObjectURL(svgBlob);

    const img=new Image();
    img.onload=()=>{
      const scale=2;
      const canvas=document.createElement("canvas");
      canvas.width=FW*scale; canvas.height=totalH*scale;
      const ctx=canvas.getContext("2d");
      ctx.scale(scale,scale);
      // bg
      ctx.fillStyle=isDark()?"#111a0e":"#f0ede6";
      ctx.fillRect(0,0,FW,totalH);
      ctx.drawImage(img,0,0,FW,totalH);
      canvas.toBlob((blob)=>{
        URL.revokeObjectURL(url);
        if(navigator.share && navigator.canShare && navigator.canShare({files:[new File([blob],"formation.png",{type:"image/png"})]})){
          navigator.share({files:[new File([blob],"formation.png",{type:"image/png"})],title:"Formation"}).catch(()=>downloadBlob(blob));
        } else { downloadBlob(blob); }
        btn.textContent="📸 Export as Image"; btn.disabled=false;
      },"image/png");
    };
    img.onerror=()=>{ btn.textContent="📸 Export as Image"; btn.disabled=false; };
    img.src=url;
  } catch(e){ btn.textContent="📸 Export as Image"; btn.disabled=false; console.error(e); }
});
function downloadBlob(blob){
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="formation.png"; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100);
}

// ── Theme change ──
window.matchMedia("(prefers-color-scheme:dark)").addEventListener("change",()=>{ drawField(); drawAll(); });

// ── Clear ──
document.getElementById("clearBtn").addEventListener("click",()=>{
  players.forEach(p=>p.name=""); bench.forEach(b=>b.name="");
  editingIdx=null; drawAll(); saveState();
});

// ── Init ──
loadState();
drawField(); drawFormationBtns(); drawAll();
const fieldEl=document.getElementById("field");
fieldEl.addEventListener("pointerdown",onPointerDown);
fieldEl.addEventListener("pointermove",onPointerMove);
fieldEl.addEventListener("pointerup",onPointerUp);
fieldEl.addEventListener("pointercancel",onPointerUp);
</script>
