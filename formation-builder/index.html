<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Formation">
<title>Formation Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  :root{--accent:#f0c040;--bg:#111a0e;--panel:#1a2216;--panel-border:#3a4a34;--field-border:#3a4a34;--text:#e0d8c8;--text-muted:#a89e88;--btn-bg:#2a3a24;--btn-text:#d4ccb4;--btn-active:#f0c040;--btn-active-text:#1a2216;--input-placeholder:#908870;--field-wrap-bg:#0d1a08;--bench-bg:#14200f;--bench-slot-bg:#1e2e18;--bench-slot-border:#3a4a34;--swap-hl:rgba(240,192,64,0.25);--export-bg:#2a3a24;--export-text:#e0d8c8;--export-hover:#3a5030;--pill-bg:#1e2e18;--pill-active-bg:#f0c040;--pill-active-text:#1a2216;--pill-border:#3a4a34;}
  @media(prefers-color-scheme:light){:root{--accent:#2e7d32;--bg:#f0ede6;--panel:#ffffff;--panel-border:#d0ccc0;--field-border:#c0bca8;--text:#2a2a20;--text-muted:#6a6250;--btn-bg:#e8e4d8;--btn-text:#3a3828;--btn-active:#2e7d32;--btn-active-text:#ffffff;--input-placeholder:#a09880;--field-wrap-bg:#d8e8d0;--bench-bg:#e4e0d4;--bench-slot-bg:#f5f2ea;--bench-slot-border:#c8c4b8;--swap-hl:rgba(46,125,50,0.18);--export-bg:#2e7d32;--export-text:#ffffff;--export-hover:#388e3c;--pill-bg:#e8e4d8;--pill-active-bg:#2e7d32;--pill-active-text:#ffffff;--pill-border:#d0ccc0;}}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;max-width:100%;overflow-x:hidden}
  body{background-color:#111a0e;background-color:var(--bg);font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#e0d8c8;color:var(--text);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:20px 12px 40px}
  h1{font-family:'Instrument Serif',Georgia,serif;font-size:26px;font-weight:400;color:#f0c040;color:var(--accent);letter-spacing:.5px;margin-bottom:2px}
  .subtitle{font-size:12px;color:#a89e88;color:var(--text-muted);margin-bottom:16px;text-align:center;line-height:1.4;padding:0 8px}
  .formations{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:14px;padding:0 8px}
  .formations button{padding:5px 11px;border-radius:6px;border:1px solid #3a4a34;border-color:var(--panel-border);background-color:#2a3a24;background-color:var(--btn-bg);color:#d4ccb4;color:var(--btn-text);font-family:'DM Sans',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer}
  .formations button.active{border-color:#f0c040;border-color:var(--accent);background-color:#f0c040;background-color:var(--btn-active);color:#1a2216;color:var(--btn-active-text)}
  .fmt-btn-wrap{display:inline-flex;align-items:center;gap:0}
  .fmt-btn-wrap .fmt-delete{padding:5px 10px!important;border-radius:0 6px 6px 0!important;border:none!important;background-color:#4a2020!important;color:#e8a0a0!important;font-size:16px!important;font-weight:700!important;cursor:pointer!important;font-family:system-ui,sans-serif!important;line-height:1!important;min-width:36px!important;min-height:32px!important;display:flex!important;align-items:center!important;justify-content:center!important}
  @media(prefers-color-scheme:light){.fmt-btn-wrap .fmt-delete{background-color:#f0d0d0!important;color:#993333!important}}
  .fmt-btn-wrap button:first-child{border-radius:6px 0 0 6px}
  .save-formation-row{display:flex;gap:6px;justify-content:center;align-items:center;margin-bottom:6px}
  .save-formation-row input{padding:4px 8px;border-radius:6px;border:1px solid #3a4a34;border-color:var(--panel-border);background-color:#1e2e18;background-color:var(--bench-slot-bg);color:#e0d8c8;color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:12px;font-weight:500;width:120px;outline:none}
  @media(prefers-color-scheme:light){.save-formation-row input{background-color:#f5f2ea;border-color:#c8c4b8;color:#2a2a20;color-scheme:light}}
  .save-formation-row input::placeholder{color:#908870;color:var(--input-placeholder)}
  .save-formation-row button{padding:4px 12px;border-radius:6px;border:none;background-color:#2a3a24;background-color:var(--export-bg);color:#e0d8c8;color:var(--export-text);font-family:'DM Sans',system-ui,sans-serif;font-size:12px;font-weight:600;cursor:pointer}
  .main{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:100%}
  @media(min-width:700px){.main{flex-direction:row;align-items:flex-start;justify-content:center;max-width:700px}}
  .pitch-col{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px}
  .field-wrap{background-color:#0d1a08;background-color:var(--field-wrap-bg);border-radius:12px;padding:8px;border:1px solid #3a4a34;border-color:var(--field-border);touch-action:none;-webkit-touch-callout:none}
  .field-wrap svg{width:100%;height:auto;display:block;border-radius:8px}
  .bench{background-color:#14200f;background-color:var(--bench-bg);border:1px solid #3a4a34;border-color:var(--panel-border);border-radius:10px;padding:10px 12px;touch-action:none;-webkit-touch-callout:none}
  .bench-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .bench-header-left{display:flex;align-items:center;gap:8px}
  .bench-title{font-family:'Instrument Serif',Georgia,serif;font-size:14px;font-weight:400;color:#f0c040;color:var(--accent)}
  .bench-header button{font-size:10px;color:#a89e88;color:var(--text-muted);background:none;border:none;cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;text-decoration:underline;text-underline-offset:2px}
  .sort-toggle{display:flex;gap:2px}
  .sort-toggle button{padding:2px 7px;border-radius:4px;border:1px solid #3a4a34;border-color:var(--panel-border);background-color:transparent;color:#a89e88;color:var(--text-muted);font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;text-decoration:none!important}
  .sort-toggle button.active{background-color:#2a3a24;background-color:var(--btn-bg);color:#e0d8c8;color:var(--text)}
  .bench-row{display:flex;gap:6px;flex-wrap:wrap}
  .bench-slot{width:58px;height:70px;border-radius:8px;background-color:#1e2e18;background-color:var(--bench-slot-bg);border:2px dashed #3a4a34;border-color:var(--bench-slot-border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;-webkit-touch-callout:none}
  .bench-slot.dragging{opacity:.4}
  .bench-slot.highlight{border-color:#f0c040;border-color:var(--accent);background-color:rgba(240,192,64,0.25);background-color:var(--swap-hl);border-style:solid}
  .bench-slot .bench-name{font-size:8px;font-weight:600;color:#e0d8c8;color:var(--text);margin-top:2px;max-width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
  .bench-slot .bench-name.empty{color:#a89e88;color:var(--text-muted);font-style:italic}
  .bench-slot .bench-prefs{font-size:7px;color:#a89e88;color:var(--text-muted);max-width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
  .bench-add{width:58px;height:70px;border-radius:8px;border:2px dashed #3a4a34;border-color:var(--bench-slot-border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;color:#a89e88;color:var(--text-muted);background:none}
  .actions-row{display:flex;gap:8px;justify-content:center}
  .action-btn{padding:8px 18px;border-radius:8px;border:none;background-color:#2a3a24;background-color:var(--export-bg);color:#e0d8c8;color:var(--export-text);font-family:'DM Sans',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer}
  .roster{background-color:#1a2216;background-color:var(--panel);border:1px solid #3a4a34;border-color:var(--panel-border);border-radius:12px;padding:14px;width:100%;max-width:400px}
  @media(min-width:700px){.roster{max-width:280px}}
  .roster-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .roster-header h2{font-family:'Instrument Serif',Georgia,serif;font-size:18px;font-weight:400;color:#f0c040;color:var(--accent)}
  .roster-header button{font-size:11px;color:#a89e88;color:var(--text-muted);background:transparent;border:none;cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;text-decoration:underline;text-underline-offset:2px}
  .section-label{font-size:10px;font-weight:600;color:#a89e88;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px}
  .roster-list{display:flex;flex-direction:column;gap:3px}
  .roster-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent}
  .roster-row.editing{background-color:rgba(240,192,64,0.25);background-color:var(--swap-hl);border-color:#f0c040;border-color:var(--accent);flex-wrap:wrap}
  .roster-row svg{flex-shrink:0}
  .roster-row input[type=text]{flex:1;min-width:0;background:transparent;border:none;outline:none;color:#e0d8c8;color:var(--text);color-scheme:dark;font-family:'DM Sans',system-ui,sans-serif;font-size:13px;font-weight:500;padding:0}
  @media(prefers-color-scheme:light){.roster-row input[type=text]{color-scheme:light}}
  .roster-row input[type=text]::placeholder{color:#908870;color:var(--input-placeholder)}
  .roster-name{font-size:13px;font-weight:500}
  .roster-name.empty{color:#a89e88;color:var(--text-muted);font-style:italic}
  .roster-name.filled{color:#e0d8c8;color:var(--text)}
  .roster-prefs-display{font-size:10px;color:#a89e88;color:var(--text-muted);margin-left:auto;white-space:nowrap}
  .roster-footer{margin-top:14px;padding-top:10px;border-top:1px solid #3a4a34;border-top-color:var(--panel-border);font-size:11px;color:#a89e88;color:var(--text-muted);line-height:1.5}
  .save-badge{display:inline-block;font-size:10px;color:#f0c040;color:var(--accent);opacity:0;margin-left:6px}
  .swap-ghost{position:fixed;pointer-events:none;z-index:9999;width:50px;height:50px;opacity:.8;transform:translate(-50%,-50%);display:none}
  /* Pref pills in roster editor */
  .pref-pills{display:flex;flex-wrap:wrap;gap:3px;width:100%;margin-top:4px}
  .pref-pill{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid #3a4a34;border-color:var(--pill-border);background-color:transparent;background-color:var(--pill-bg);color:#a89e88;color:var(--text-muted);font-family:'DM Sans',system-ui,sans-serif}
  .pref-pill.active{background-color:#f0c040!important;background-color:var(--pill-active-bg)!important;color:#1a2216!important;color:var(--pill-active-text)!important;border-color:#f0c040!important;border-color:var(--pill-active-bg)!important}
  /* Bench remove button */
  .bench-remove{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background-color:#4a2020;color:#e8a0a0;font-size:12px;font-weight:700;line-height:18px;text-align:center;cursor:pointer;border:none;font-family:system-ui,sans-serif;display:none}
  .bench-slot:hover .bench-remove,.bench-slot:active .bench-remove{display:block}
  @media(hover:none){.bench-remove{display:block!important}}
  .bench-slot{position:relative}
</style>
</head>
<body>
<h1>Formation Builder</h1>
<p class="subtitle">8v8 &middot; Drag to reposition &middot; Tap roster to rename &middot; Drag bench onto field to swap <span id="saveBadge" class="save-badge">&#10003; Saved</span></p>
<div class="formations" id="formationBtns"></div>
<div class="save-formation-row">
  <input type="text" id="saveNameInput" placeholder="Formation name" maxlength="16">
  <button id="saveFormationBtn">Save</button>
</div>
<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px">
  <button class="action-btn" id="undoBtn" disabled style="padding:4px 10px;font-size:16px;opacity:0.3">&#8592;</button>
  <div id="formationLabel" style="font-size:13px;font-weight:600;color:#f0c040;color:var(--accent);text-align:center;min-height:18px"></div>
  <button class="action-btn" id="redoBtn" disabled style="padding:4px 10px;font-size:16px;opacity:0.3">&#8594;</button>
</div>
<div class="main">
  <div class="pitch-col">
    <div class="field-wrap" id="fieldWrap">
      <svg id="field" viewBox="0 0 380 560" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="bench" id="benchArea">
      <div class="bench-title">Bench</div>
      <div class="bench-row" id="benchRow"></div>
    </div>
    <div class="actions-row">
      <button class="action-btn" id="exportBtn">&#128247; Image</button>
      <button class="action-btn" id="rosterExportBtn">&#128228; Export</button>
      <button class="action-btn" id="rosterImportBtn">&#128229; Import</button>
      <input type="file" id="importFileInput" accept=".json,application/json" style="display:none">
    </div>
    <div id="importMsg" style="font-size:11px;color:#a89e88;color:var(--text-muted);margin-top:4px;text-align:center;min-height:16px;max-width:400px"></div>
  </div>
  <div class="roster">
    <div class="roster-header">
      <h2>Roster</h2>
      <button id="clearBtn">Clear all</button>
    </div>
    <div id="rosterContent"></div>
    <div class="roster-footer">Tap a player to edit name &amp; preferred positions. Drag bench onto field to swap.</div>
  </div>
</div>
<div class="swap-ghost" id="swapGhost"></div>
<script>
var FW=380,FH=560,PR=24;
var JERSEY="M -6 -18 L -14 -14 L -22 -8 L -18 0 L -12 -4 L -12 18 Q -12 22 -8 22 L 8 22 Q 12 22 12 18 L 12 -4 L 18 0 L 22 -8 L 14 -14 L 6 -18 Q 3 -14 0 -14 Q -3 -14 -6 -18 Z";
var COLLAR="M -6 -18 Q -3 -12 0 -12 Q 3 -12 6 -18";
var NS="http://www.w3.org/2000/svg";
var STORAGE_KEY="formation_builder_v5";
var ALL_POSITIONS=["GK","LB","CB","RB","CDM","LM","CM","RM","CAM","LW","ST","RW"];

var FORMATIONS={
“3-3-1”:[{x:.5,y:.92,role:“GK”},{x:.2,y:.75,role:“CB”},{x:.5,y:.72,role:“CB”},{x:.8,y:.75,role:“CB”},{x:.2,y:.48,role:“CM”},{x:.5,y:.45,role:“CM”},{x:.8,y:.48,role:“CM”},{x:.5,y:.22,role:“ST”}],
“2-3-2”:[{x:.5,y:.92,role:“GK”},{x:.3,y:.75,role:“CB”},{x:.7,y:.75,role:“CB”},{x:.2,y:.5,role:“LM”},{x:.5,y:.47,role:“CM”},{x:.8,y:.5,role:“RM”},{x:.35,y:.24,role:“ST”},{x:.65,y:.24,role:“ST”}],
“3-2-2”:[{x:.5,y:.92,role:“GK”},{x:.2,y:.75,role:“CB”},{x:.5,y:.72,role:“CB”},{x:.8,y:.75,role:“CB”},{x:.33,y:.48,role:“CM”},{x:.67,y:.48,role:“CM”},{x:.35,y:.24,role:“ST”},{x:.65,y:.24,role:“ST”}],
“3-1-2-1”:[{x:.5,y:.92,role:“GK”},{x:.2,y:.75,role:“CB”},{x:.5,y:.72,role:“CB”},{x:.8,y:.75,role:“CB”},{x:.5,y:.55,role:“CDM”},{x:.3,y:.38,role:“CAM”},{x:.7,y:.38,role:“CAM”},{x:.5,y:.2,role:“ST”}],
“2-4-1”:[{x:.5,y:.92,role:“GK”},{x:.3,y:.75,role:“CB”},{x:.7,y:.75,role:“CB”},{x:.15,y:.48,role:“LM”},{x:.4,y:.45,role:“CM”},{x:.6,y:.45,role:“CM”},{x:.85,y:.48,role:“RM”},{x:.5,y:.22,role:“ST”}],
“2-1-2-1-1”:[{x:.5,y:.92,role:“GK”},{x:.3,y:.78,role:“CB”},{x:.7,y:.78,role:“CB”},{x:.5,y:.6,role:“CDM”},{x:.25,y:.44,role:“LM”},{x:.75,y:.44,role:“RM”},{x:.5,y:.3,role:“CAM”},{x:.5,y:.16,role:“ST”}]
};

// Zone definitions: role -> {x1,y1,x2,y2} in normalized coords
var ZONES={
GK:{x1:0,y1:.88,x2:1,y2:1},
LB:{x1:0,y1:.68,x2:.3,y2:.88},CB:{x1:.3,y1:.68,x2:.7,y2:.88},RB:{x1:.7,y1:.68,x2:1,y2:.88},
CDM:{x1:.25,y1:.58,x2:.75,y2:.68},
LM:{x1:0,y1:.30,x2:.25,y2:.68},CM:{x1:.25,y1:.42,x2:.75,y2:.58},RM:{x1:.75,y1:.30,x2:1,y2:.68},
CAM:{x1:.25,y1:.30,x2:.75,y2:.42},
LW:{x1:0,y1:0,x2:.28,y2:.30},ST:{x1:.28,y1:0,x2:.72,y2:.30},RW:{x1:.72,y1:0,x2:1,y2:.30}
};

// Position order for sorting
var POS_ORDER={GK:0,LB:1,CB:2,RB:3,CDM:4,LM:5,CM:6,RM:7,CAM:8,LW:9,ST:10,RW:11};

var currentFormation=“3-3-1”;
var players=FORMATIONS[“3-3-1”].map(function(p){return{x:p.x,y:p.y,role:p.role,name:””,prefs:[]};});
var bench=[];for(var _b=0;_b<5;_b++)bench.push({name:””,role:“SUB”,prefs:[]});
var customFormations={};
var editingIdx=null;
var draggingFieldIdx=-1;
var benchDragState=null;
var fieldDragState=null;

// ── Undo/Redo history ──
var history=[];
var historyIdx=-1;
var MAX_HISTORY=40;
var historyPaused=false;

function takeSnapshot(){
return JSON.stringify({f:currentFormation,p:players.map(function(p){return{x:p.x,y:p.y,role:p.role,name:p.name,prefs:p.prefs?p.prefs.slice():[]};}),b:bench.map(function(b){return{name:b.name,prefs:b.prefs?b.prefs.slice():[]};})});
}
function pushHistory(){
if(historyPaused)return;
var snap=takeSnapshot();
// Don’t push if identical to current
if(historyIdx>=0&&history[historyIdx]===snap)return;
// Trim any redo states
history=history.slice(0,historyIdx+1);
history.push(snap);
if(history.length>MAX_HISTORY)history.shift();
historyIdx=history.length-1;
updateUndoRedoBtns();
}
function restoreSnapshot(snap){
var s=JSON.parse(snap);
currentFormation=s.f;
for(var i=0;i<8;i++){
players[i].x=s.p[i].x;players[i].y=s.p[i].y;players[i].role=s.p[i].role;
players[i].name=s.p[i].name;players[i].prefs=s.p[i].prefs||[];
}
for(var j=0;j<5;j++){
bench[j].name=s.b[j]?s.b[j].name||””:””;
bench[j].prefs=s.b[j]&&s.b[j].prefs?s.b[j].prefs:[];
}
}
function undo(){
if(historyIdx<=0)return;
historyIdx–;
historyPaused=true;
restoreSnapshot(history[historyIdx]);
drawField();drawFormationBtns();drawAll();saveState();
historyPaused=false;
updateUndoRedoBtns();
}
function redo(){
if(historyIdx>=history.length-1)return;
historyIdx++;
historyPaused=true;
restoreSnapshot(history[historyIdx]);
drawField();drawFormationBtns();drawAll();saveState();
historyPaused=false;
updateUndoRedoBtns();
}
function updateUndoRedoBtns(){
var ub=document.getElementById(“undoBtn”),rb=document.getElementById(“redoBtn”);
if(ub){ub.disabled=historyIdx<=0;ub.style.opacity=historyIdx<=0?“0.3”:“1”;}
if(rb){rb.disabled=historyIdx>=history.length-1;rb.style.opacity=historyIdx>=history.length-1?“0.3”:“1”;}
}

function isDark(){return window.matchMedia(”(prefers-color-scheme:dark)”).matches;}
function themeColors(){
var d=isDark();
return{fieldBase:d?”#1a6b37”:”#1e8040”,fieldStripe:d?”#237d44”:”#2a9850”,
playerFill:d?”#e8dcc8”:”#ffffff”,playerStroke:d?”#5a4a30”:”#4a6a40”,playerText:d?”#2d2418”:”#1a3010”,
gkFill:d?”#f0c040”:”#ffd54f”,gkStroke:d?”#a07810”:”#b08a10”,
benchFill:d?”#8aae7a”:”#b0d4a8”,benchStroke:d?”#4a6040”:”#5a8050”,benchText:d?”#1a2a10”:”#1a3010”,
zoneFill:d?“rgba(240,192,64,0.15)”:“rgba(46,125,50,0.12)”,zoneStroke:d?“rgba(240,192,64,0.4)”:“rgba(46,125,50,0.35)”};
}

// ── Persistence ──
function loadCustomFormations(){try{var r=localStorage.getItem(STORAGE_KEY+”_custom”);if(r)customFormations=JSON.parse(r);}catch(e){customFormations={};}}
function saveCustomFormations(){try{localStorage.setItem(STORAGE_KEY+”_custom”,JSON.stringify(customFormations));}catch(e){}}

function el(tag,attrs){var e=document.createElementNS(NS,tag);if(attrs){var k=Object.keys(attrs);for(var i=0;i<k.length;i++)e.setAttribute(k[i],String(attrs[k[i]]));}return e;}

// ── Position zones ──
function roleFromPosition(x,y){
if(y>0.88)return”GK”;
if(y>0.68){if(x<0.3)return”LB”;if(x>0.7)return”RB”;return”CB”;}
if(y>0.58){if(x<0.25)return”LM”;if(x>0.75)return”RM”;return”CDM”;}
if(y>0.42){if(x<0.25)return”LM”;if(x>0.75)return”RM”;return”CM”;}
if(y>0.30){if(x<0.25)return”LM”;if(x>0.75)return”RM”;return”CAM”;}
if(x<0.28)return”LW”;if(x>0.72)return”RW”;return”ST”;
}
function inferFormation(){
var lines=[{r:[“CB”,“LB”,“RB”],c:0},{r:[“CDM”],c:0},{r:[“CM”,“LM”,“RM”],c:0},{r:[“CAM”],c:0},{r:[“ST”,“LW”,“RW”],c:0}];
for(var i=0;i<players.length;i++){if(players[i].role===“GK”)continue;for(var j=0;j<lines.length;j++){if(lines[j].r.indexOf(players[i].role)>=0){lines[j].c++;break;}}}
var p=[];for(var k=0;k<lines.length;k++){if(lines[k].c>0)p.push(lines[k].c);}return p.join(”-”);
}
function updateRolesAndFormation(){
for(var i=0;i<players.length;i++)players[i].role=roleFromPosition(players[i].x,players[i].y);
currentFormation=inferFormation();drawFormationBtns();
}

players[fi].name=bench[bii].name;players[fi].prefs=bench[bii].prefs||[];
bench[bii].name=tmpN;bench[bii].prefs=tmpP||[];

}else if(!benchDragState.active){editingIdx=“b”+benchDragState.benchIdx;}

function findNearestFieldPlayer(cx,cy){
var svg=document.getElementById(“field”),rect=svg.getBoundingClientRect();
var best=-1,bestDist=50;
for(var i=0;i<players.length;i++){
var px=players[i].x*rect.width+rect.left,py=players[i].y*rect.height+rect.top;
var d=Math.sqrt((cx-px)*(cx-px)+(cy-py)*(cy-py));
if(d<bestDist){best=i;bestDist=d;}
}
return best;
}

if(!g||g===fieldEl)return;e.preventDefault();
var idx=parseInt(g.getAttribute(“data-idx”));
draggingFieldIdx=idx;fieldDragState={idx:idx,startX:players[idx].x,startY:players[idx].y,swapTarget:-1};
g.style.cursor=“grabbing”;g.setPointerCapture(e.pointerId);
// Show zone highlights for dragged player’s prefs
var p=players[idx];if(p.prefs&&p.prefs.length>0)drawZoneHighlights(p.prefs);
});
fieldEl.addEventListener(“pointermove”,function(e){
if(draggingFieldIdx<0||!fieldDragState)return;e.preventDefault();
var pt=getSVGPoint(e.clientX,e.clientY);
var nx=Math.max(PR,Math.min(FW-PR,pt.x))/FW,ny=Math.max(PR,Math.min(FH-PR,pt.y))/FH;
players[draggingFieldIdx].x=nx;players[draggingFieldIdx].y=ny;
var g=document.querySelector(’.player-g[data-idx=”’+draggingFieldIdx+’”]’);
if(g)g.setAttribute(“transform”,“translate(”+(nx*FW)+”,”+(ny*FH)+”)”);
var target=findNearestOtherFieldPlayer(e.clientX,e.clientY,draggingFieldIdx);
if(target!==fieldDragState.swapTarget){fieldDragState.swapTarget=target;drawPlayers();
var g2=document.querySelector(’.player-g[data-idx=”’+draggingFieldIdx+’”]’);
if(g2)g2.setAttribute(“transform”,“translate(”+(nx*FW)+”,”+(ny*FH)+”)”);
}
});
fieldEl.addEventListener(“pointerup”,function(){
if(draggingFieldIdx<0||!fieldDragState)return;
drawZoneHighlights(null);
var idx=fieldDragState.idx,st=fieldDragState.swapTarget;
if(st>=0){players[idx].x=fieldDragState.startX;players[idx].y=fieldDragState.startY;
var tn=players[idx].name,tp=players[idx].prefs;players[idx].name=players[st].name;players[idx].prefs=players[st].prefs||[];players[st].name=tn;players[st].prefs=tp||[];}
updateRolesAndFormation();fieldDragState=null;draggingFieldIdx=-1;drawAll();saveState();
});
fieldEl.addEventListener(“pointercancel”,function(){
if(fieldDragState){players[fieldDragState.idx].x=fieldDragState.startX;players[fieldDragState.idx].y=fieldDragState.startY;fieldDragState=null;}
draggingFieldIdx=-1;drawZoneHighlights(null);drawAll();
});

// ── Export ──
document.getElementById(“exportBtn”).addEventListener(“click”,function(){
var btn=this;btn.textContent=“Generating\u2026”;btn.disabled=true;
try{
var benchH=bench.length>0?95:0,pad=bench.length>0?20:0,totalH=FH+pad+benchH;var c=themeColors();
var xsvg=el(“svg”,{xmlns:NS,width:FW*2,height:totalH*2,viewBox:“0 0 “+FW+” “+totalH});
xsvg.appendChild(el(“rect”,{width:FW,height:totalH,fill:isDark()?”#111a0e”:”#f0ede6”}));
var fsvg=document.getElementById(“field”),fG=el(“g”);
var nodes=fsvg.childNodes;for(var n=0;n<nodes.length;n++)fG.appendChild(nodes[n].cloneNode(true));
xsvg.appendChild(fG);
if(bench.length>0){
var by=FH+pad;
xsvg.appendChild(el(“rect”,{x:8,y:by-5,width:FW-16,height:benchH,rx:8,fill:isDark()?”#14200f”:”#e4e0d4”}));
var bL=el(“text”,{x:18,y:by+14,fill:isDark()?”#f0c040”:”#2e7d32”});
bL.style.cssText=“font:600 12px ‘DM Sans’,system-ui,sans-serif;”;bL.textContent=“Bench”;xsvg.appendChild(bL);
var maxB=Math.min(bench.length,5);var spacing=Math.min(70,Math.floor((FW-40)/maxB));
for(var i=0;i<maxB;i++){
var bx=22+i*spacing,bpy=by+55;
var bg=el(“g”,{transform:“translate(”+bx+”,”+bpy+”) scale(0.6)”});
bg.appendChild(el(“path”,{d:JERSEY,fill:c.benchFill,stroke:c.benchStroke,“stroke-width”:“2”,“stroke-linejoin”:“round”}));
var brt=el(“text”,{y:“6”,“text-anchor”:“middle”,“dominant-baseline”:“central”,fill:c.benchText});
brt.style.cssText=“font:700 11px ‘DM Sans’,system-ui,sans-serif;”;brt.textContent=“SUB”;bg.appendChild(brt);xsvg.appendChild(bg);
var bnm=bench[i].name||””+(i+1);
var bnt=el(“text”,{x:bx,y:bpy+22,“text-anchor”:“middle”,“dominant-baseline”:“central”,fill:isDark()?”#e0d8c8”:”#2a2a20”});
bnt.style.cssText=“font:600 10px ‘DM Sans’,system-ui,sans-serif;”;
bnt.textContent=bnm.length>8?bnm.slice(0,7)+”\u2026”:bnm;xsvg.appendChild(bnt);
}
var fl=el(“text”,{x:FW-18,y:by+14,“text-anchor”:“end”,fill:isDark()?”#a89e88”:”#6a6250”});
fl.style.cssText=“font:600 11px ‘DM Sans’,system-ui,sans-serif;”;fl.textContent=currentFormation;xsvg.appendChild(fl);
}
var svgStr=new XMLSerializer().serializeToString(xsvg);
var svgBlob=new Blob([svgStr],{type:“image/svg+xml;charset=utf-8”});var url=URL.createObjectURL(svgBlob);
var img=new Image();
img.onload=function(){var canvas=document.createElement(“canvas”);canvas.width=FW*2;canvas.height=totalH*2;
var ctx=canvas.getContext(“2d”);ctx.drawImage(img,0,0,FW*2,totalH*2);URL.revokeObjectURL(url);
canvas.toBlob(function(blob){var file=new File([blob],“formation.png”,{type:“image/png”});
if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]}))navigator.share({files:[file],title:“Formation \u2013 “+currentFormation}).catch(function(){downloadBlob(blob);});
else downloadBlob(blob);btn.textContent=”\ud83d\udcf7 Export as Image”;btn.disabled=false;},“image/png”);};
img.onerror=function(){btn.textContent=”\ud83d\udcf7 Export as Image”;btn.disabled=false;};img.src=url;
}catch(e){console.error(e);btn.textContent=”\ud83d\udcf7 Export as Image”;btn.disabled=false;}
});
function downloadBlob(blob){var a=document.createElement(“a”);a.href=URL.createObjectURL(blob);a.download=“formation-”+currentFormation+”.png”;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},100);}

// ── Clear ──
document.getElementById(“clearBtn”).addEventListener(“click”,function(){
for(var i=0;i<players.length;i++){players[i].name=””;players[i].prefs=[];}
for(var j=0;j<bench.length;j++){bench[j].name=””;bench[j].prefs=[];}
editingIdx=null;drawAll();saveState();
});

// ── Save formation ──
document.getElementById(“saveFormationBtn”).addEventListener(“click”,function(){
var ni=document.getElementById(“saveNameInput”),name=ni.value.trim();if(!name){ni.focus();return;}
if(FORMATIONS[name])return;
customFormations[name]=players.map(function(p){return{x:p.x,y:p.y,role:p.role};});
saveCustomFormations();currentFormation=name;saveState();drawFormationBtns();
});
document.getElementById(“saveNameInput”).addEventListener(“keydown”,function(e){if(e.key===“Enter”)document.getElementById(“saveFormationBtn”).click();});

// ── Roster Export/Import ──
document.getElementById(“rosterExportBtn”).addEventListener(“click”,function(){
var roster={
field:players.map(function(p){return{name:p.name,prefs:p.prefs||[]};}),
bench:bench.map(function(b){return{name:b.name,prefs:b.prefs||[]};})
};
var json=JSON.stringify(roster,null,2);
var blob=new Blob([json],{type:“application/json”});
var file=new File([blob],“roster.json”,{type:“application/json”});
if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
navigator.share({files:[file],title:“Team Roster”}).catch(function(){downloadFile(blob);});
}else{
downloadFile(blob);
}
});
function downloadFile(blob){
var a=document.createElement(“a”);a.href=URL.createObjectURL(blob);
a.download=“roster.json”;document.body.appendChild(a);a.click();
setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},100);
}

document.getElementById(“rosterImportBtn”).addEventListener(“click”,function(){
document.getElementById(“importFileInput”).click();
});
document.getElementById(“importFileInput”).addEventListener(“change”,function(e){
var file=e.target.files&&e.target.files[0];
if(!file)return;
var reader=new FileReader();
reader.onload=function(ev){
try{
var data=JSON.parse(ev.target.result);
if(data.field&&Array.isArray(data.field)){
for(var i=0;i<Math.min(data.field.length,8);i++){
players[i].name=data.field[i].name||””;
players[i].prefs=Array.isArray(data.field[i].prefs)?data.field[i].prefs:[];
}
}
if(data.bench&&Array.isArray(data.bench)){
for(var j=0;j<Math.min(data.bench.length,5);j++){
bench[j].name=data.bench[j].name||””;
bench[j].prefs=Array.isArray(data.bench[j].prefs)?data.bench[j].prefs:[];
}
}
drawAll();saveState();
showImportMsg(“Roster imported!”);
}catch(err){
showImportMsg(“Invalid file. Make sure it’s a roster JSON.”);
}
};
reader.onerror=function(){showImportMsg(“Could not read file.”);};
reader.readAsText(file);
// Reset input so the same file can be re-imported
e.target.value=””;
});

function showImportMsg(msg){
var el=document.getElementById(“importMsg”);
if(el){el.textContent=msg;setTimeout(function(){el.textContent=””;},3000);}
// Also flash save badge
var b=document.getElementById(“saveBadge”);b.style.opacity=“1”;setTimeout(function(){b.style.opacity=“0”;},1200);
}

// ── Undo/Redo buttons ──
document.getElementById(“undoBtn”).addEventListener(“click”,undo);
document.getElementById(“redoBtn”).addEventListener(“click”,redo);

// ── Theme ──
window.matchMedia(”(prefers-color-scheme:dark)”).addEventListener(“change”,function(){drawField();drawAll();});

// ── Init ──
loadCustomFormations();loadState();
drawField();drawFormationBtns();drawAll();
pushHistory(); // initial snapshot
</script>

</body>
