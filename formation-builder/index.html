<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Formation">
<title>Formation Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  /*
    Safari fix: do NOT use <meta name="color-scheme"> as it can cause Safari
    to override dark variables with its own light defaults. Instead, set
    color-scheme via CSS only on elements that need it (like inputs).
    Dark theme is the default; light is opt-in via media query.
  */

:root {
–accent: #f0c040;
–bg: #111a0e;
–panel: #1a2216;
–panel-border: #3a4a34;
–field-border: #3a4a34;
–text: #e0d8c8;
–text-muted: #a89e88;
–btn-bg: #2a3a24;
–btn-text: #d4ccb4;
–btn-active: #f0c040;
–btn-active-text: #1a2216;
–input-placeholder: #908870;
–field-wrap-bg: #0d1a08;
–bench-bg: #14200f;
–bench-slot-bg: #1e2e18;
–bench-slot-border: #3a4a34;
–swap-hl: rgba(240,192,64,0.25);
–export-bg: #2a3a24;
–export-text: #e0d8c8;
–export-hover: #3a5030;
}

@media (prefers-color-scheme: light) {
:root {
–accent: #2e7d32;
–bg: #f0ede6;
–panel: #ffffff;
–panel-border: #d0ccc0;
–field-border: #c0bca8;
–text: #2a2a20;
–text-muted: #6a6250;
–btn-bg: #e8e4d8;
–btn-text: #3a3828;
–btn-active: #2e7d32;
–btn-active-text: #ffffff;
–input-placeholder: #a09880;
–field-wrap-bg: #d8e8d0;
–bench-bg: #e4e0d4;
–bench-slot-bg: #f5f2ea;
–bench-slot-border: #c8c4b8;
–swap-hl: rgba(46,125,50,0.18);
–export-bg: #2e7d32;
–export-text: #ffffff;
–export-hover: #388e3c;
}
}

*, *::before, *::after {
margin: 0;
padding: 0;
box-sizing: border-box;
-webkit-tap-highlight-color: transparent;
}

html, body {
width: 100%;
max-width: 100%;
overflow-x: hidden;
}

body {
background-color: #111a0e;
background-color: var(–bg);
font-family: ‘DM Sans’, system-ui, -apple-system, ‘Segoe UI’, Roboto, Helvetica, Arial, sans-serif;
color: #e0d8c8;
color: var(–text);
min-height: 100vh;
min-height: 100dvh;
display: flex;
flex-direction: column;
align-items: center;
padding: 20px 12px 40px 12px;
}

h1 {
font-family: ‘Instrument Serif’, Georgia, ‘Times New Roman’, serif;
font-size: 26px;
font-weight: 400;
color: #f0c040;
color: var(–accent);
letter-spacing: 0.5px;
margin-bottom: 2px;
}

.subtitle {
font-size: 12px;
color: #a89e88;
color: var(–text-muted);
margin-bottom: 16px;
text-align: center;
line-height: 1.4;
padding: 0 8px;
}

/* ── Formation buttons ── */
.formations {
display: flex;
flex-wrap: wrap;
gap: 5px;
justify-content: center;
margin-bottom: 14px;
padding: 0 8px;
}

.formations button {
padding: 5px 11px;
border-radius: 6px;
border-width: 1px;
border-style: solid;
border-color: #3a4a34;
border-color: var(–panel-border);
background-color: #2a3a24;
background-color: var(–btn-bg);
color: #d4ccb4;
color: var(–btn-text);
font-family: ‘DM Sans’, system-ui, sans-serif;
font-size: 13px;
font-weight: 600;
cursor: pointer;
}

.formations button.active {
border-color: #f0c040;
border-color: var(–accent);
background-color: #f0c040;
background-color: var(–btn-active);
color: #1a2216;
color: var(–btn-active-text);
}

/* ── Main layout ── */
.main {
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
width: 100%;
max-width: 100%;
}

@media (min-width: 700px) {
.main {
flex-direction: row;
align-items: flex-start;
justify-content: center;
max-width: 680px;
}
}

/* ── Pitch column ── */
.pitch-col {
display: flex;
flex-direction: column;
gap: 10px;
width: 100%;
max-width: 400px;
}

/* ── Field wrapper ── */
.field-wrap {
background-color: #0d1a08;
background-color: var(–field-wrap-bg);
border-radius: 12px;
padding: 8px;
border-width: 1px;
border-style: solid;
border-color: #3a4a34;
border-color: var(–field-border);
touch-action: none;
-webkit-touch-callout: none;
}

.field-wrap svg {
width: 100%;
height: auto;
display: block;
border-radius: 8px;
}

/* ── Bench ── */
.bench {
background-color: #14200f;
background-color: var(–bench-bg);
border-width: 1px;
border-style: solid;
border-color: #3a4a34;
border-color: var(–panel-border);
border-radius: 10px;
padding: 10px 12px;
touch-action: none;
-webkit-touch-callout: none;
}

.bench-title {
font-family: ‘Instrument Serif’, Georgia, serif;
font-size: 14px;
font-weight: 400;
color: #f0c040;
color: var(–accent);
margin-bottom: 8px;
}

.bench-row {
display: flex;
gap: 6px;
flex-wrap: wrap;
}

.bench-slot {
width: 58px;
height: 70px;
border-radius: 8px;
background-color: #1e2e18;
background-color: var(–bench-slot-bg);
border-width: 2px;
border-style: dashed;
border-color: #3a4a34;
border-color: var(–bench-slot-border);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
cursor: grab;
user-select: none;
-webkit-user-select: none;
touch-action: none;
-webkit-touch-callout: none;
}

.bench-slot.dragging { opacity: 0.4; }

.bench-slot.highlight {
border-color: #f0c040;
border-color: var(–accent);
background-color: rgba(240,192,64,0.25);
background-color: var(–swap-hl);
border-style: solid;
}

.bench-slot .bench-name {
font-size: 8px;
font-weight: 600;
color: #e0d8c8;
color: var(–text);
margin-top: 2px;
max-width: 54px;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
text-align: center;
}

.bench-slot .bench-name.empty {
color: #a89e88;
color: var(–text-muted);
font-style: italic;
}

.bench-slot .bench-prefs {
font-size: 7px;
color: #a89e88;
color: var(–text-muted);
max-width: 54px;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
text-align: center;
}

/* ── Actions ── */
.actions-row {
display: flex;
gap: 8px;
justify-content: center;
}

.action-btn {
padding: 8px 18px;
border-radius: 8px;
border: none;
background-color: #2a3a24;
background-color: var(–export-bg);
color: #e0d8c8;
color: var(–export-text);
font-family: ‘DM Sans’, system-ui, sans-serif;
font-size: 13px;
font-weight: 600;
cursor: pointer;
}

/* ── Roster ── */
.roster {
background-color: #1a2216;
background-color: var(–panel);
border-width: 1px;
border-style: solid;
border-color: #3a4a34;
border-color: var(–panel-border);
border-radius: 12px;
padding: 14px;
width: 100%;
max-width: 400px;
}

@media (min-width: 700px) {
.roster { max-width: 260px; }
}

.roster-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 12px;
}

.roster-header h2 {
font-family: ‘Instrument Serif’, Georgia, serif;
font-size: 18px;
font-weight: 400;
color: #f0c040;
color: var(–accent);
}

.roster-header button {
font-size: 11px;
color: #a89e88;
color: var(–text-muted);
background-color: transparent;
border: none;
cursor: pointer;
font-family: ‘DM Sans’, system-ui, sans-serif;
text-decoration: underline;
text-underline-offset: 2px;
}

.section-label {
font-size: 10px;
font-weight: 600;
color: #a89e88;
color: var(–text-muted);
text-transform: uppercase;
letter-spacing: 1px;
margin: 10px 0 4px;
}

.roster-list {
display: flex;
flex-direction: column;
gap: 3px;
}

.roster-row {
display: flex;
align-items: center;
gap: 8px;
padding: 6px 10px;
border-radius: 6px;
cursor: pointer;
border-width: 1px;
border-style: solid;
border-color: transparent;
flex-wrap: wrap;
}

.roster-row.editing {
background-color: rgba(240,192,64,0.25);
background-color: var(–swap-hl);
border-color: #f0c040;
border-color: var(–accent);
}

.roster-row svg { flex-shrink: 0; }

.roster-row input {
flex: 1;
min-width: 0;
background-color: transparent;
border: none;
outline: none;
color: #e0d8c8;
color: var(–text);
color-scheme: dark;
font-family: ‘DM Sans’, system-ui, sans-serif;
font-size: 13px;
font-weight: 500;
padding: 0;
}

@media (prefers-color-scheme: light) {
.roster-row input { color-scheme: light; }
}

.roster-row input::placeholder {
color: #908870;
color: var(–input-placeholder);
}

.roster-name { font-size: 13px; font-weight: 500; }
.roster-name.empty { color: #a89e88; color: var(–text-muted); font-style: italic; }
.roster-name.filled { color: #e0d8c8; color: var(–text); }

.roster-prefs-display {
font-size: 10px;
color: #a89e88;
color: var(–text-muted);
width: 100%;
white-space: normal;
margin-top: -2px;
padding-left: 34px;
}

.roster-footer {
margin-top: 14px;
padding-top: 10px;
border-top-width: 1px;
border-top-style: solid;
border-top-color: #3a4a34;
border-top-color: var(–panel-border);
font-size: 11px;
color: #a89e88;
color: var(–text-muted);
line-height: 1.5;
}

.save-badge {
display: inline-block;
font-size: 10px;
color: #f0c040;
color: var(–accent);
opacity: 0;
margin-left: 6px;
}
.save-badge.show { opacity: 1; }

.swap-ghost {
position: fixed;
pointer-events: none;
z-index: 9999;
width: 50px;
height: 50px;
opacity: 0.8;
transform: translate(-50%, -50%);
display: none;
}

/* Formation button wrapper */
.fmt-btn-wrap {
display: inline-flex;
align-items: center;
gap: 0;
}
.fmt-btn-wrap .fmt-delete {
padding: 5px 10px !important;
border-radius: 0 6px 6px 0 !important;
border: none !important;
background-color: #4a2020 !important;
color: #e8a0a0 !important;
font-size: 16px !important;
font-weight: 700 !important;
cursor: pointer !important;
font-family: system-ui, sans-serif !important;
line-height: 1 !important;
min-width: 36px !important;
min-height: 32px !important;
display: flex !important;
align-items: center !important;
justify-content: center !important;
}
@media (prefers-color-scheme: light) {
.fmt-btn-wrap .fmt-delete {
background-color: #f0d0d0 !important;
color: #993333 !important;
}
}
.fmt-btn-wrap button:first-child {
border-radius: 6px 0 0 6px;
}

.save-formation-row {
display: flex;
gap: 6px;
justify-content: center;
align-items: center;
margin-bottom: 6px;
}
.save-formation-row input {
padding: 4px 8px;
border-radius: 6px;
border-width: 1px;
border-style: solid;
border-color: #3a4a34;
border-color: var(–panel-border);
background-color: #1e2e18;
background-color: var(–bench-slot-bg);
color: #e0d8c8;
color: var(–text);
font-family: ‘DM Sans’, system-ui, sans-serif;
font-size: 12px;
font-weight: 500;
width: 120px;
outline: none;
}
@media (prefers-color-scheme: light) {
.save-formation-row input {
background-color: #f5f2ea;
border-color: #c8c4b8;
color: #2a2a20;
color-scheme: light;
}
}
.save-formation-row input::placeholder {
color: #908870;
color: var(–input-placeholder);
}
.save-formation-row button {
padding: 4px 12px;
border-radius: 6px;
border: none;
background-color: #2a3a24;
background-color: var(–export-bg);
color: #e0d8c8;
color: var(–export-text);
font-family: ‘DM Sans’, system-ui, sans-serif;
font-size: 12px;
font-weight: 600;
cursor: pointer;
}

/* ── NEW: Preferred position pills ── */
.pref-pills {
display: flex;
flex-wrap: wrap;
gap: 3px;
width: 100%;
margin-top: 4px;
}
.pref-pill {
padding: 2px 7px;
border-radius: 4px;
font-size: 10px;
font-weight: 600;
cursor: pointer;
border-width: 1px;
border-style: solid;
border-color: #3a4a34;
border-color: var(–panel-border);
background-color: transparent;
color: #a89e88;
color: var(–text-muted);
font-family: ‘DM Sans’, system-ui, sans-serif;
}
.pref-pill.active {
background-color: #f0c040 !important;
color: #1a2216 !important;
border-color: #f0c040 !important;
}
@media (prefers-color-scheme: light) {
.pref-pill.active {
background-color: #2e7d32 !important;
color: #fff !important;
border-color: #2e7d32 !important;
}
}
/* ── Availability toggle ── */
.avail-toggle {
cursor: pointer;
font-size: 12px;
line-height: 1;
flex-shrink: 0;
width: 20px;
text-align: center;
user-select: none;
-webkit-user-select: none;
}
/* ── Match panel ── */
.match-panel {
background-color: #14200f;
background-color: var(–bench-bg);
border-width: 1px;
border-style: solid;
border-color: #3a4a34;
border-color: var(–panel-border);
border-radius: 10px;
padding: 10px 12px;
}
.match-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 8px;
}
.sub-log {
font-size: 11px;
color: #e0d8c8;
color: var(–text);
line-height: 1.6;
max-height: 150px;
overflow-y: auto;
}
.sub-log-entry {
display: flex;
gap: 8px;
align-items: baseline;
}
.sub-log-time {
font-weight: 700;
color: #f0c040;
color: var(–accent);
min-width: 40px;
font-size: 11px;
}
.sub-log-detail {
font-size: 11px;
color: #e0d8c8;
color: var(–text);
}
.sub-log-empty {
font-size: 11px;
color: #a89e88;
color: var(–text-muted);
font-style: italic;
}
/* ── Player stats counters ── */
.stat-counters {
display: flex;
gap: 2px;
margin-left: auto;
flex-shrink: 0;
}
.stat-btn {
padding: 1px 5px;
border-radius: 3px;
font-size: 9px;
font-weight: 600;
font-family: ‘DM Sans’, system-ui, sans-serif;
cursor: pointer;
border: 1px solid #3a4a34;
border-color: var(–panel-border);
background-color: transparent;
color: #a89e88;
color: var(–text-muted);
line-height: 1.3;
user-select: none;
-webkit-user-select: none;
}
.stat-btn.has-value {
color: #e0d8c8;
color: var(–text);
}
</style>

</head>
<body>

<h1>Formation Builder</h1>
<p class="subtitle">8v8 &middot; Drag to reposition &middot; Tap roster to rename &middot; Drag bench onto field to swap <span id="saveBadge" class="save-badge">&#10003; Saved</span></p>

<div class="formations" id="formationBtns"></div>
<div class="save-formation-row">
  <input type="text" id="saveNameInput" placeholder="Formation name" maxlength="16">
  <button id="saveFormationBtn">Save</button>
</div>
<div id="formationLabel" style="font-size:13px;font-weight:600;color:#f0c040;color:var(--accent);margin-bottom:12px;text-align:center;min-height:18px;"></div>

<div class="main">
  <div class="pitch-col">
    <div class="field-wrap" id="fieldWrap">
      <svg id="field" viewBox="0 0 380 560" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="bench" id="benchArea">
      <div class="bench-title">Bench</div>
      <div class="bench-row" id="benchRow"></div>
    </div>
    <div class="actions-row">
      <button class="action-btn" id="exportBtn">&#128247; Image</button>
      <button class="action-btn" id="rosterExportBtn">&#128228; Export</button>
      <button class="action-btn" id="rosterImportBtn">&#128229; Import</button>
      <input type="file" id="importFileInput" accept=".json,application/json" style="display:none">
    </div>
    <div class="match-panel" id="matchPanel">
      <div class="match-header">
        <span class="bench-title">Match</span>
        <span id="matchClock" style="font-size:14px;font-weight:700;color:#e0d8c8;color:var(--text);font-family:'DM Sans',system-ui,sans-serif;">00:00</span>
      </div>
      <div class="actions-row" style="margin-bottom:8px">
        <button class="action-btn" id="matchStartBtn" style="padding:5px 14px;font-size:12px;">&#9654; Start</button>
        <button class="action-btn" id="matchEndBtn" style="padding:5px 14px;font-size:12px;" disabled>&#9632; End</button>
        <button class="action-btn" id="matchResetBtn" style="padding:5px 14px;font-size:12px;">&#8634; Reset</button>
      </div>
      <div id="subLog" class="sub-log"></div>
    </div>
  </div>
  <div class="roster">
    <div class="roster-header">
      <h2>Roster</h2>
      <button id="clearBtn">Clear all</button>
    </div>
    <div id="rosterContent"></div>
    <div class="roster-footer">Tap a player to edit name &amp; preferred positions. Drag bench onto field to swap.</div>
  </div>
</div>

<div class="swap-ghost" id="swapGhost"></div>

<script>
var FW=380,FH=560,PR=24;
var JERSEY="M -6 -18 L -14 -14 L -22 -8 L -18 0 L -12 -4 L -12 18 Q -12 22 -8 22 L 8 22 Q 12 22 12 18 L 12 -4 L 18 0 L 22 -8 L 14 -14 L 6 -18 Q 3 -14 0 -14 Q -3 -14 -6 -18 Z";
var COLLAR="M -6 -18 Q -3 -12 0 -12 Q 3 -12 6 -18";

  "White":{dark:"#e8dcc8",light:"#ffffff"},

  "Black":{dark:"#2a2a2a",light:"#424242"},
  "Orange":{dark:"#d4851a",light:"#fb8c00"},
  "Purple":{dark:"#8a4ab0",light:"#7b1fa2"}
};
var STORAGE_KEY="formation_builder_v4";
var BENCH_COUNT=5;

/* NEW: position constants and zone map */
var ALL_POSITIONS=["GK","LB","CB","RB","CDM","LM","CM","RM","CAM","LW","ST","RW"];
var ZONES={
  GK:{x1:0,y1:.88,x2:1,y2:1},
  LB:{x1:0,y1:.68,x2:.3,y2:.88},CB:{x1:.3,y1:.68,x2:.7,y2:.88},RB:{x1:.7,y1:.68,x2:1,y2:.88},
  CDM:{x1:.25,y1:.58,x2:.75,y2:.68},
  LM:{x1:0,y1:.30,x2:.25,y2:.68},CM:{x1:.25,y1:.42,x2:.75,y2:.58},RM:{x1:.75,y1:.30,x2:1,y2:.68},
  CAM:{x1:.25,y1:.30,x2:.75,y2:.42},
  LW:{x1:0,y1:0,x2:.28,y2:.30},ST:{x1:.28,y1:0,x2:.72,y2:.30},RW:{x1:.72,y1:0,x2:1,y2:.30}
};

var FORMATIONS={
  "3-3-1":[{x:.5,y:.92,role:"GK"},{x:.2,y:.75,role:"CB"},{x:.5,y:.72,role:"CB"},{x:.8,y:.75,role:"CB"},{x:.2,y:.48,role:"CM"},{x:.5,y:.45,role:"CM"},{x:.8,y:.48,role:"CM"},{x:.5,y:.22,role:"ST"}],
  "2-3-2":[{x:.5,y:.92,role:"GK"},{x:.3,y:.75,role:"CB"},{x:.7,y:.75,role:"CB"},{x:.2,y:.5,role:"LM"},{x:.5,y:.47,role:"CM"},{x:.8,y:.5,role:"RM"},{x:.35,y:.24,role:"ST"},{x:.65,y:.24,role:"ST"}],
  "3-2-2":[{x:.5,y:.92,role:"GK"},{x:.2,y:.75,role:"CB"},{x:.5,y:.72,role:"CB"},{x:.8,y:.75,role:"CB"},{x:.33,y:.48,role:"CM"},{x:.67,y:.48,role:"CM"},{x:.35,y:.24,role:"ST"},{x:.65,y:.24,role:"ST"}],

function loadState(){
  try{

    if(Array.isArray(s.players)&&s.players.length===8){
      var fallback=all[currentFormation]||FORMATIONS["3-3-1"];
      players=s.players.map(function(p,i){return{
        x:typeof p.x==="number"?p.x:fallback[i].x,
        y:typeof p.y==="number"?p.y:fallback[i].y,
        role:p.role||fallback[i].role,name:p.name||"",
        prefs:Array.isArray(p.prefs)?p.prefs:[],
        available:p.available!==false,
        stats:p.stats&&typeof p.stats==="object"?{gp:p.stats.gp||0,g:p.stats.g||0,a:p.stats.a||0}:{gp:0,g:0,a:0}
      };});

    if(Array.isArray(s.bench)){bench=s.bench.slice(0,BENCH_COUNT).map(function(b){var st=b.stats&&typeof b.stats==="object"?{gp:b.stats.gp||0,g:b.stats.g||0,a:b.stats.a||0}:{gp:0,g:0,a:0};return{name:b.name||"",role:"SUB",prefs:Array.isArray(b.prefs)?b.prefs:[],available:b.available!==false,stats:st};});}
    while(bench.length<BENCH_COUNT)bench.push({name:"",role:"SUB",prefs:[],available:true,stats:{gp:0,g:0,a:0}});
    /* Load match state */
    if(s.matchActive)matchActive=true;

    if(typeof s.matchStartTime==="number")matchStartTime=s.matchStartTime;
    if(Array.isArray(s.subLog))subLog=s.subLog;

  }catch(e){}
}

// ── Bench drag ──
var ghost=document.getElementById("swapGhost");
var benchRowEl=document.getElementById("benchRow");

benchRowEl.addEventListener("pointerdown",function(e){
  var slot=e.target.closest?e.target.closest(".bench-slot"):null;
  if(!slot){var t=e.target;while(t&&t!==this){if(t.className&&t.className.indexOf&&t.className.indexOf("bench-slot")>=0){slot=t;break;}t=t.parentNode;}}
  if(!slot)return;
  e.preventDefault();e.stopPropagation();
  var idx=parseInt(slot.getAttribute("data-bench-idx"));
  benchDragState={benchIdx:idx,active:false,startX:e.clientX,startY:e.clientY,targetFieldIdx:-1};
  this.setPointerCapture(e.pointerId);
},false);

benchRowEl.addEventListener("pointermove",function(e){
  if(!benchDragState)return;
  e.preventDefault();e.stopPropagation();
  if(!benchDragState.active){
    var dx=e.clientX-benchDragState.startX,dy=e.clientY-benchDragState.startY;
    if(Math.abs(dx)<6&&Math.abs(dy)<6)return;
    benchDragState.active=true;
    var c=themeColors();
    ghost.innerHTML='<svg width="50" height="50" viewBox="-26 -22 52 48" xmlns="'+NS+'"><path d="'+JERSEY+'" fill="'+c.benchFill+'" stroke="'+c.benchStroke+'" stroke-width="1.5" stroke-linejoin="round"/></svg>';
    ghost.style.display="block";
    drawBench();
    /* NEW: show zone highlights for bench player */
    var bp=bench[benchDragState.benchIdx];
    if(bp&&bp.prefs&&bp.prefs.length>0)drawZoneHighlights(bp.prefs);
  }
  ghost.style.left=e.clientX+"px";ghost.style.top=e.clientY+"px";
  var target=findNearestFieldPlayer(e.clientX,e.clientY);
  if(target!==benchDragState.targetFieldIdx){benchDragState.targetFieldIdx=target;drawPlayers();}
},false);

benchRowEl.addEventListener("pointerup",function(e){
  if(!benchDragState)return;
  e.preventDefault();
  ghost.style.display="none";
  drawZoneHighlights(null); /* NEW: clear highlights */
  if(benchDragState.active&&benchDragState.targetFieldIdx>=0){
    var fi=benchDragState.targetFieldIdx,bii=benchDragState.benchIdx;
    /* CHANGED: swap prefs too */
    var tmpN=players[fi].name;var tmpP=players[fi].prefs||[];var tmpA=players[fi].available!==false;var tmpS=players[fi].stats||{gp:0,g:0,a:0};
    /* Log sub if match active */
    if(matchActive){
      var secs=getMatchSeconds();
      var mm=String(Math.floor(secs/60));var ss=String(secs%60);
      if(ss.length<2)ss="0"+ss;
      subLog.push({time:mm+":"+ss,playerIn:bench[bii].name||"Sub "+(bii+1),playerOut:tmpN||"Player "+(fi+1)});
      drawSubLog();
    }
    players[fi].name=bench[bii].name;players[fi].prefs=bench[bii].prefs||[];players[fi].available=bench[bii].available!==false;players[fi].stats=bench[bii].stats||{gp:0,g:0,a:0};
    bench[bii].name=tmpN;bench[bii].prefs=tmpP;bench[bii].available=tmpA;bench[bii].stats=tmpS;
    saveState();
  }else if(!benchDragState.active){editingIdx="b"+benchDragState.benchIdx;}
  benchDragState=null;drawAll();
},false);

benchRowEl.addEventListener("pointercancel",function(){
  if(!benchDragState)return;ghost.style.display="none";drawZoneHighlights(null);benchDragState=null;drawAll();
},false);

function findNearestFieldPlayer(cx,cy){
  var svg=document.getElementById("field"),rect=svg.getBoundingClientRect();
  var best=-1,bestDist=50;
  for(var i=0;i<players.length;i++){
    var px=players[i].x*rect.width+rect.left,py=players[i].y*rect.height+rect.top;
    var d=Math.sqrt((cx-px)*(cx-px)+(cy-py)*(cy-py));
    if(d<bestDist){best=i;bestDist=d;}
  }
  return best;
}

      else{bench[i].available=!bench[i].available;}
      drawAll();saveState();

      /* CHANGED: editor now includes pref pills + done button */
      var inp=document.createElement("input");inp.type="text";inp.value=item.name;inp.placeholder=isField?"Player name":"Sub name";inp.maxLength=14;
      var currentPrefs=item.prefs?item.prefs.slice():[];

        if(isField){players[i].name=inp.value.trim();players[i].prefs=currentPrefs;}
        else{bench[i].name=inp.value.trim();bench[i].prefs=currentPrefs;}
        editingIdx=null;drawAll();saveState();
      };
      inp.addEventListener("keydown",function(e){if(e.key==="Enter")commitEdit();if(e.key==="Escape"){editingIdx=null;drawAll();}});
      row.appendChild(inp);
      // Pref pills
      var pills=document.createElement("div");pills.className="pref-pills";

        var pill=document.createElement("button");pill.type="button";

        pill.textContent=pos;
        pill.addEventListener("click",function(ev){
          ev.preventDefault();ev.stopPropagation();
          var idx=currentPrefs.indexOf(pos);
          if(idx>=0)currentPrefs.splice(idx,1);else currentPrefs.push(pos);
          pill.className="pref-pill"+(currentPrefs.indexOf(pos)>=0?" active":"");
        });

      done.addEventListener("click",function(ev){ev.preventDefault();ev.stopPropagation();commitEdit();});

      var statKeys=[{key:"gp",label:"GP"},{key:"g",label:"G"},{key:"a",label:"A"}];
      for(var sk=0;sk<statKeys.length;sk++){(function(sk){
        var skey=statKeys[sk].key,slabel=statKeys[sk].label;

// ── Formation buttons ──
function drawFormationBtns(){
  var wrap=document.getElementById("formationBtns");wrap.innerHTML="";

    btn.className=key===currentFormation?"active":"";
    btn.addEventListener("click",function(){
      loadFormationByKey(key,FORMATIONS[key]);
    });
    wrap.appendChild(btn);
  })(keys[k]);}

  // Custom formations
  var ckeys=Object.keys(customFormations);
  for(var c=0;c<ckeys.length;c++){(function(key){
    var btnWrap=document.createElement("div");
    btnWrap.className="fmt-btn-wrap";
    var btn=document.createElement("button");
    btn.textContent=key;
    btn.className=key===currentFormation?"active":"";
    btn.style.borderStyle="dashed";
    btn.addEventListener("click",function(){
      loadFormationByKey(key,customFormations[key]);
    });
    btnWrap.appendChild(btn);
    var del=document.createElement("button");
    del.className="fmt-delete";
    del.textContent="\u00d7";
    del.setAttribute("data-confirm","no");
    del.addEventListener("click",function(e){
      e.preventDefault();
      e.stopPropagation();

        delete customFormations[key];
        saveCustomFormations();
        if(currentFormation===key) currentFormation=inferFormation();
        drawFormationBtns();
        saveState();
      }else{
        del.setAttribute("data-confirm","yes");
        del.textContent="?";
        del.style.backgroundColor="#882222";
        setTimeout(function(){
          del.setAttribute("data-confirm","no");
          del.textContent="\u00d7";
          del.style.backgroundColor="";

      }
    });
    btnWrap.appendChild(del);
    wrap.appendChild(btnWrap);
  })(ckeys[c]);}

  // Formation label
  var label=document.getElementById("formationLabel");
  var all=allFormations();
  var isKnown=!!all[currentFormation];
  label.textContent="Current: "+currentFormation+(isKnown?"":" (custom)");

  var saveInput=document.getElementById("saveNameInput");

}

function loadFormationByKey(key,positions){
  currentFormation=key;
  var names=players.map(function(p){return p.name;});
  var prefs=players.map(function(p){return p.prefs||[];});
  var avails=players.map(function(p){return p.available!==false;});
  var stats=players.map(function(p){return p.stats||{gp:0,g:0,a:0};});
  players=positions.map(function(p,i){return{x:p.x,y:p.y,role:p.role,name:names[i]||"",prefs:prefs[i]||[],available:avails[i]!==false,stats:stats[i]||{gp:0,g:0,a:0}};});
  editingIdx=null;drawFormationBtns();drawAll();saveState();
}

// ── Position zone detection ──
// y is 0=top (attack) to 1=bottom (GK). x is 0=left to 1=right.
function roleFromPosition(x,y){
  // GK zone: bottom 12%
  if(y>0.88) return "GK";
  // Defense: 68%-88%
  if(y>0.68){
    if(x<0.3) return "LB";
    if(x>0.7) return "RB";
    return "CB";
  }
  // CDM: 58%-68%
  if(y>0.58){
    if(x<0.25) return "LM";
    if(x>0.75) return "RM";
    return "CDM";
  }
  // CM: 42%-58%
  if(y>0.42){
    if(x<0.25) return "LM";
    if(x>0.75) return "RM";
    return "CM";
  }
  // CAM: 30%-42%
  if(y>0.30){
    if(x<0.25) return "LM";
    if(x>0.75) return "RM";
    return "CAM";
  }
  // Attack: top 30%
  if(x<0.28) return "LW";
  if(x>0.72) return "RW";
  return "ST";
}

// ── Formation inference from roles ──
function inferFormation(){
  var lines=[
    {roles:["CB","LB","RB"],count:0},    // defense
    {roles:["CDM"],count:0},              // def mid
    {roles:["CM","LM","RM"],count:0},     // midfield
    {roles:["CAM"],count:0},              // att mid
    {roles:["ST","LW","RW"],count:0}      // attack
  ];
  for(var i=0;i<players.length;i++){
    if(players[i].role==="GK") continue;
    for(var j=0;j<lines.length;j++){
      if(lines[j].roles.indexOf(players[i].role)>=0){lines[j].count++;break;}
    }
  }
  var parts=[];
  for(var k=0;k<lines.length;k++){
    if(lines[k].count>0) parts.push(lines[k].count);
  }
  return parts.join("-");
}

function updateRolesAndFormation(){
  for(var i=0;i<players.length;i++){
    players[i].role=roleFromPosition(players[i].x,players[i].y);
  }
  currentFormation=inferFormation();
  drawFormationBtns();
}

// ── Field drag with swap + auto-role ──
var fieldEl=document.getElementById("field");
var fieldDragState=null; // {idx, startX, startY, swapTarget}

function getSVGPoint(cx,cy){var pt=fieldEl.createSVGPoint();pt.x=cx;pt.y=cy;return pt.matrixTransform(fieldEl.getScreenCTM().inverse());}

function findNearestOtherFieldPlayer(cx,cy,excludeIdx){
  var svg=document.getElementById("field"),rect=svg.getBoundingClientRect();
  var best=-1,bestDist=45;
  for(var i=0;i<players.length;i++){
    if(i===excludeIdx)continue;
    var px=players[i].x*rect.width+rect.left,py=players[i].y*rect.height+rect.top;
    var d=Math.sqrt((cx-px)*(cx-px)+(cy-py)*(cy-py));
    if(d<bestDist){best=i;bestDist=d;}
  }
  return best;
}

fieldEl.addEventListener("pointerdown",function(e){
  if(benchDragState)return;
  var g=e.target;while(g&&g!==fieldEl){if(g.getAttribute&&g.getAttribute("class")==="player-g")break;g=g.parentNode;}
  if(!g||g===fieldEl)return;
  e.preventDefault();
  var idx=parseInt(g.getAttribute("data-idx"));
  draggingFieldIdx=idx;
  fieldDragState={idx:idx,startX:players[idx].x,startY:players[idx].y,swapTarget:-1};
  g.style.cursor="grabbing";g.setPointerCapture(e.pointerId);
  /* NEW: show zone highlights for dragged field player */
  var p=players[idx];
  if(p.prefs&&p.prefs.length>0)drawZoneHighlights(p.prefs);
});

fieldEl.addEventListener("pointermove",function(e){
  if(draggingFieldIdx<0||!fieldDragState)return;e.preventDefault();
  var pt=getSVGPoint(e.clientX,e.clientY);
  var nx=Math.max(PR,Math.min(FW-PR,pt.x))/FW,ny=Math.max(PR,Math.min(FH-PR,pt.y))/FH;
  players[draggingFieldIdx].x=nx;players[draggingFieldIdx].y=ny;
  var g=document.querySelector('.player-g[data-idx="'+draggingFieldIdx+'"]');
  if(g)g.setAttribute("transform","translate("+(nx*FW)+","+(ny*FH)+")");
  // Check for swap target
  var target=findNearestOtherFieldPlayer(e.clientX,e.clientY,draggingFieldIdx);
  if(target!==fieldDragState.swapTarget){
    fieldDragState.swapTarget=target;
    drawPlayers();
    // Re-move the dragged player visually on top (drawPlayers resets positions)
    var g2=document.querySelector('.player-g[data-idx="'+draggingFieldIdx+'"]');
    if(g2)g2.setAttribute("transform","translate("+(nx*FW)+","+(ny*FH)+")");
  }
});

fieldEl.addEventListener("pointerup",function(e){
  if(draggingFieldIdx<0||!fieldDragState)return;
  drawZoneHighlights(null); /* NEW: clear highlights */
  var idx=fieldDragState.idx;
  var swapTarget=fieldDragState.swapTarget;
  if(swapTarget>=0){
    // Swap: move dragged player back to start, swap names + prefs
    players[idx].x=fieldDragState.startX;
    players[idx].y=fieldDragState.startY;
    var tmpName=players[idx].name;var tmpPrefs=players[idx].prefs||[];var tmpAvail=players[idx].available!==false;var tmpStats=players[idx].stats||{gp:0,g:0,a:0};
    players[idx].name=players[swapTarget].name;players[idx].prefs=players[swapTarget].prefs||[];players[idx].available=players[swapTarget].available!==false;players[idx].stats=players[swapTarget].stats||{gp:0,g:0,a:0};
    players[swapTarget].name=tmpName;players[swapTarget].prefs=tmpPrefs;players[swapTarget].available=tmpAvail;players[swapTarget].stats=tmpStats;
  }
  // Update roles based on final positions
  updateRolesAndFormation();
  fieldDragState=null;
  draggingFieldIdx=-1;
  drawAll();
  saveState();
});

fieldEl.addEventListener("pointercancel",function(){
  if(fieldDragState){
    // Revert position
    players[fieldDragState.idx].x=fieldDragState.startX;
    players[fieldDragState.idx].y=fieldDragState.startY;
    fieldDragState=null;
  }
  draggingFieldIdx=-1;
  drawZoneHighlights(null); /* NEW */
  drawAll();
});

// ── Match controls ──
function getMatchSeconds(){
  if(matchActive){
    return matchElapsed+Math.floor((Date.now()-matchStartTime)/1000);
  }
  return matchElapsed;
}

function formatClock(secs){
  var mm=String(Math.floor(secs/60));var ss=String(secs%60);
  if(mm.length<2)mm="0"+mm;if(ss.length<2)ss="0"+ss;
  return mm+":"+ss;
}

function updateClock(){
  var el=document.getElementById("matchClock");
  if(el)el.textContent=formatClock(getMatchSeconds());
}

function drawSubLog(){
  var cont=document.getElementById("subLog");
  if(!cont)return;
  cont.innerHTML="";
  // Merge sub and stat events into one timeline
  var events=[];
  for(var i=0;i<subLog.length;i++){
    events.push({time:subLog[i].time,sort:i,kind:"sub",data:subLog[i]});
  }
  for(var j=0;j<statLog.length;j++){
    events.push({time:statLog[j].time,sort:1000+j,kind:"stat",data:statLog[j]});
  }
  // Sort by time string then by insertion order
  events.sort(function(a,b){if(a.time<b.time)return -1;if(a.time>b.time)return 1;return a.sort-b.sort;});
  if(events.length===0){
    var empty=document.createElement("div");empty.className="sub-log-empty";
    empty.textContent=matchActive?"No events yet":"Start a match to track events";
    cont.appendChild(empty);
    return;
  }
  var statIcons={g:"\u26BD",a:"\ud83c\udfaf",gp:"\ud83d\udcca"};
  var statLabels={g:"Goal",a:"Assist",gp:"GP"};
  for(var k=0;k<events.length;k++){
    var ev=events[k];
    var entry=document.createElement("div");entry.className="sub-log-entry";
    var timeEl=document.createElement("span");timeEl.className="sub-log-time";timeEl.textContent=ev.time;
    var detEl=document.createElement("span");detEl.className="sub-log-detail";
    if(ev.kind==="sub"){
      detEl.textContent=ev.data.playerIn+" \u2192 ON, "+ev.data.playerOut+" \u2192 OFF";
    }else{
      detEl.textContent=(statIcons[ev.data.type]||"")+" "+(ev.data.player||"?")+" \u2014 "+(statLabels[ev.data.type]||ev.data.type);
    }
    entry.appendChild(timeEl);entry.appendChild(detEl);
    cont.appendChild(entry);
  }
  cont.scrollTop=cont.scrollHeight;
}

function updateMatchBtns(){
  var startBtn=document.getElementById("matchStartBtn");
  var endBtn=document.getElementById("matchEndBtn");
  if(matchActive){
    startBtn.disabled=true;startBtn.style.opacity="0.4";
    endBtn.disabled=false;endBtn.style.opacity="1";
  }else{
    startBtn.disabled=false;startBtn.style.opacity="1";
    endBtn.disabled=true;endBtn.style.opacity="0.4";
  }
}

document.getElementById("matchStartBtn").addEventListener("click",function(){
  if(matchActive)return;
  matchActive=true;
  matchStartTime=Date.now();
  matchClockInterval=setInterval(updateClock,1000);
  updateMatchBtns();drawSubLog();saveState();
});

document.getElementById("matchEndBtn").addEventListener("click",function(){
  if(!matchActive)return;
  matchElapsed=getMatchSeconds();
  matchActive=false;
  matchStartTime=0;
  clearInterval(matchClockInterval);matchClockInterval=null;
  updateClock();updateMatchBtns();saveState();
});

document.getElementById("matchResetBtn").addEventListener("click",function(){
  matchActive=false;matchElapsed=0;matchStartTime=0;subLog=[];statLog=[];
  clearInterval(matchClockInterval);matchClockInterval=null;
  updateClock();updateMatchBtns();drawSubLog();saveState();
});

window.matchMedia("(prefers-color-scheme:dark)").addEventListener("change",function(){drawField();drawAll();});

loadCustomFormations();loadState();drawField();drawFormationBtns();drawAll();
/* Restore match state */
updateMatchBtns();drawSubLog();updateClock();
if(matchActive){matchClockInterval=setInterval(updateClock,1000);}
